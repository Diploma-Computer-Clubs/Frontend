<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Underlie - Редактировать</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        :root {
            --bg-dark: #333333;
            --bg-light: #cccccc;
            --field-bg: #2d2d2d;
            --text-main: #ffffff;
            --accent-green: #00ff00;
            --error-red: #ff4d4d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex; justify-content: center;
            min-height: 100vh; overflow-x: hidden;
        }

        #toast-container {
            position: fixed; top: 20px; right: 20px; z-index: 9999;
            display: flex; flex-direction: column; gap: 10px;
        }
        .toast {
            background: #262626; color: #fff; padding: 14px 20px; border-radius: 12px;
            display: flex; align-items: center; gap: 12px; min-width: 250px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            border-left: 4px solid var(--accent-green);
            animation: slideIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        .toast.error { border-left-color: var(--error-red); }
        .toast span.icon { font-size: 20px; }
        .toast.error span.icon { color: var(--error-red); }
        .toast.success span.icon { color: var(--accent-green); }

        @keyframes slideIn {
            from { transform: translateX(120%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes fadeOut {
            to { transform: translateX(120%); opacity: 0; }
        }

        .burger-menu { background: none; border: none; display: flex; flex-direction: column; gap: 5px; cursor: pointer; z-index: 1001; }
        .burger-bar { width: 25px; height: 2px; background-color: #fff; transition: 0.3s; }
        .burger-menu.open .burger-bar:nth-child(1) { transform: translateY(7px) rotate(45deg); }
        .burger-menu.open .burger-bar:nth-child(2) { opacity: 0; }
        .burger-menu.open .burger-bar:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

        .side-drawer {
            position: fixed; top: 0; left: 0; width: 280px; height: 100vh;
            background-color: #2d2d2d; z-index: 1000; transform: translateX(-100%);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column; box-shadow: 10px 0 30px rgba(0,0,0,0.5);
        }
        .side-drawer.open { transform: translateX(0); }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; z-index: 999; }
        .overlay.active { display: block; }

        .user-block { padding: 60px 25px 30px; background-color: #262626; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .user-name { font-weight: 700; color: #fff; display: block; }
        .user-phone { font-size: 0.8rem; color: #888; margin-top: 5px; display: block; }
        .drawer-nav { display: flex; flex-direction: column; }
        .drawer-link { display: flex; align-items: center; padding: 18px 25px; color: #fff; text-decoration: none; font-size: 0.95rem; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .drawer-link span { margin-right: 15px; color: #888; }
        .drawer-link.logout { color: #ff6b6b; border-top: 1px solid rgba(255,255,255,0.07); }
        .drawer-link.logout span { color: #ff6b6b; }

        .phone-container { width: 100%; max-width: 430px; display: flex; flex-direction: column; padding: 20px; min-height: 100vh; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0 40px; }
        .header h1 { font-size: 22px; font-weight: 700; }

        .section-title { color: var(--bg-light); font-size: 14px; font-weight: 700; margin-bottom: 25px; text-transform: uppercase; letter-spacing: 1px; }

        .field-group { position: relative; margin-bottom: 25px; }
        .field-group label {
            position: absolute; top: -10px; left: 12px;
            background-color: var(--bg-dark); padding: 0 8px;
            font-size: 12px; font-weight: 700; color: var(--bg-light); z-index: 1;
        }

        .field-group input, .select-wrapper select {
            width: 100%; background: var(--field-bg);
            border: 1px solid #555; border-radius: 12px;
            padding: 16px; color: white; font-size: 16px; outline: none;
            transition: 0.3s;
        }

        .select-wrapper { position: relative; }
        .select-wrapper select { appearance: none; cursor: pointer; }
        .select-wrapper::after {
            content: ""; position: absolute; right: 15px; top: 50%;
            width: 8px; height: 8px; border-right: 2px solid #aaa; border-bottom: 2px solid #aaa;
            transform: translateY(-70%) rotate(45deg); pointer-events: none;
        }

        .field-group input:focus, .select-wrapper select:focus { border-color: var(--accent-green); }

        .save-btn {
            width: 100%; background: transparent;
            border: 1px solid var(--accent-green); color: var(--accent-green);
            padding: 18px; border-radius: 12px;
            font-size: 14px; font-weight: 700;
            margin-top: auto; margin-bottom: 20px;
            cursor: pointer; transition: 0.3s;
        }
        .save-btn:active { background: var(--accent-green); color: black; }

        select option { background: #2d2d2d; color: white; }
    </style>
</head>
<body>

<div id="toast-container"></div>
<div class="overlay" id="overlay"></div>

<nav class="side-drawer" id="sideDrawer">
    <div class="user-block">
        <span class="user-name" id="drawer_name">Загрузка...</span>
        <span class="user-phone" id="drawer_phone">...</span>
    </div>  
    <div class="drawer-nav">
        <a href="profile.html" class="drawer-link"><span class="material-symbols-outlined">account_circle</span> Профиль</a>
        <a href="mainpage.html" class="drawer-link"><span class="material-symbols-outlined">home</span> Главная</a>
        <a href="map.html" class="drawer-link"><span class="material-symbols-outlined">search</span> Карта клубов</a>
        <a href="booking.html" class="drawer-link"><span class="material-symbols-outlined">diamond</span> Бронь</a>
        <a href="#" class="drawer-link logout" id="logoutLink"><span class="material-symbols-outlined">logout</span> Выйти</a>
    </div>
</nav>

<div class="phone-container">
    <div class="header">
        <button class="burger-menu" id="burger">
            <span class="burger-bar"></span>
            <span class="burger-bar"></span>
            <span class="burger-bar"></span>
        </button>
        <h1>Редактировать</h1>
        <div style="width: 25px;"></div>
    </div>

    <p class="section-title">Аккаунт</p>

    <div class="field-group">
        <label>Имя</label>
        <input type="text" id="full_name" placeholder="Ваше имя">
    </div>

    <div class="field-group">
        <label>Город</label>
        <div class="select-wrapper">
            <select id="city_id">
                <option value="" disabled selected>Загрузка городов...</option>
            </select>
        </div>
    </div>

    <button class="save-btn" onclick="updateProfile()">Сохранить изменения</button>
</div>
    <script src="../js/profile_edit.js"></script>
<script>
    document.getElementById('logoutLink').addEventListener('click', function(e) {
        e.preventDefault();
        localStorage.clear();
        window.location.href = 'check.html';
    });
</script>
</body>
</html>
