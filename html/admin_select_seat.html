<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ — Выбор места</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        body { background: #000; color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* ── HEADER ── */
        .slide-header {
            position: sticky;
            top: 0;
            z-index: 10;
            background: rgba(17,17,17,0.97);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px 16px 14px;
            border-bottom: 1px solid rgba(255,255,255,0.07);
            text-align: center;
        }

        .header-top {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .back-btn {
            background: rgba(255,255,255,0.08);
            border: none;
            border-radius: 10px;
            width: 38px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #fff;
            text-decoration: none;
            transition: background 0.2s;
        }
        .back-btn:active { background: rgba(255,255,255,0.18); }

        .admin-badge {
            background: #8b1a1a;
            color: #fff;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1px;
            padding: 4px 10px;
            border-radius: 20px;
            text-transform: uppercase;
        }

        .logout-btn {
            background: none;
            border: none;
            color: rgba(255,255,255,0.35);
            cursor: pointer;
            display: flex;
            align-items: center;
            font-size: 18px;
            padding: 4px;
            transition: color 0.2s;
        }
        .logout-btn:hover { color: #ff6b6b; }

        .club-logo-frame {
            width: 50px; height: 50px;
            border-radius: 12px;
            background: #222;
            border: 1px solid rgba(255,255,255,0.1);
            overflow: hidden;
            margin-bottom: 6px;
            display: flex; align-items: center; justify-content: center;
        }
        .club-logo-img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .club-logo-placeholder { font-size: 20px; color: rgba(255,255,255,0.3); font-weight: 700; }

        .club-name { font-size: 15px; font-weight: 700; color: #fff; text-transform: uppercase; letter-spacing: 1px; }
        .club-address { font-size: 10px; color: rgba(255,255,255,0.5); display: flex; align-items: center; justify-content: center; gap: 4px; margin-top: 2px; }

        /* ── NEW TIME PICKER BAR (Narrower & Smarter) ── */
        .time-bar {
            width: 100%;
            max-width: 320px; /* Поуже */
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            margin-top: 14px;
            background: rgba(255,255,255,0.04);
            border-radius: 12px;
            padding: 4px 8px;
            border: 1px solid rgba(255,255,255,0.08);
        }

        .time-group {
            display: flex;
            align-items: center;
            background: rgba(0,0,0,0.2);
            padding: 4px 8px;
            border-radius: 8px;
            gap: 6px;
        }

        .time-bar input[type="time"] {
            background: transparent;
            border: none;
            color: #fff;
            font-size: 14px;
            font-weight: 700;
            font-family: 'Montserrat', sans-serif;
            outline: none;
            width: 65px;
            cursor: pointer;
        }
        .time-bar input[type="time"]::-webkit-calendar-picker-indicator { display: none; } /* Скрываем иконку для чистоты */

        .time-sep { color: rgba(255,255,255,0.2); font-size: 12px; }

        .ws-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: #444;
            margin-left: 6px;
        }
        .ws-dot.connected { background: #4CAF50; box-shadow: 0 0 8px #4CAF50; }
        .ws-dot.error     { background: #ff4d4d; }

        .time-confirm-btn {
            background: #8b1a1a;
            border: none;
            color: #fff;
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 800;
            cursor: pointer;
            transition: 0.2s;
            text-transform: uppercase;
        }
        .time-confirm-btn:active { transform: scale(0.95); background: #a32424; }

        /* ── MAP ── */
        .map-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            overflow: auto;
            background: #0a0a0a;
        }

        .map-container {
            position: relative;
            width: 340px;
            height: 460px;
            background: #000;
            border: 1px solid #222;
            border-radius: 20px;
        }

        .pc {
            position: absolute;
            width: 36px; height: 36px;
            background: #111;
            border: 1px solid #333;
            border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
            font-size: 11px; font-weight: 700;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s;
            color: #666;
        }
        .pc.selected { background: #8b1a1a; border-color: #ff4d4d; color: #fff; box-shadow: 0 0 12px rgba(139,26,26,0.6); }
        .pc.busy { background: #141414 !important; border-color: #222 !important; color: #2a2a2a !important; cursor: default; }

        .label { position: absolute; font-size: 11px; font-weight: 800; color: #222; text-transform: uppercase; letter-spacing: 1px; pointer-events: none; }

        .static-obj {
            position: absolute;
            border: 1px solid rgba(255,255,255,0.1);
            color: #444;
            font-size: 9px;
            font-weight: 700;
            text-transform: uppercase;
            display: flex; align-items: center; justify-content: center; text-align: center;
        }
        .reception { width: 100px; height: 40px; border-style: dashed; flex-direction: column; gap: 2px; }
        .reception span { font-size: 16px; }
        .wc { width: 40px; height: 35px; background: #0a0a0a; }

        /* ── FOOTER ── */
        .footer {
            background: #000;
            padding: 16px 16px 26px;
            border-top: 1px solid #1a1a1a;
            z-index: 20;
        }

        .date-selector {
            display: flex;
            gap: 12px;
            justify-content: center; /* Центрируем, так как дней мало */
            margin-bottom: 16px;
        }

        .date-item {
            flex: 1;
            max-width: 80px;
            height: 50px;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid transparent;
        }
        .date-item.active { background: #8b1a1a; color: #fff; border-color: rgba(255,255,255,0.1); }
        .date-item span { font-size: 9px; color: #666; text-transform: uppercase; }
        .date-item.active span { color: #eee; }
        .date-item b { font-size: 16px; font-weight: 700; }

        .info-box { margin-bottom: 16px; }
        .info-label { font-size: 12px; color: #888; margin-bottom: 2px; }
        .info-value { font-size: 14px; font-weight: 700; line-height: 1.4; }
        .info-value span { color: #ff4d4d; }

        .btn-confirm {
            width: 100%;
            padding: 16px;
            background: #333; color: #666;
            border: none; border-radius: 14px;
            font-size: 15px; font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            pointer-events: none;
            font-family: 'Montserrat', sans-serif;
        }
        .btn-confirm.active { background: #8b1a1a; color: #fff; pointer-events: auto; }

        /* ── PC TOOLTIP ── */
        .pc-tooltip {
            position: fixed;
            z-index: 9998;
            background: rgba(15, 15, 15, 0.97);
            border: 1px solid rgba(139, 26, 26, 0.6);
            border-radius: 12px;
            padding: 10px 14px;
            pointer-events: none;
            opacity: 0;
            transform: translateY(6px) scale(0.97);
            transition: opacity 0.18s ease, transform 0.18s ease;
            box-shadow: 0 8px 28px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.04);
            min-width: 170px;
            max-width: 230px;
        }
        .pc-tooltip.visible {
            opacity: 1;
            transform: translateY(0) scale(1);
        }
        .pc-tooltip-header {
            display: flex;
            align-items: center;
            gap: 7px;
            margin-bottom: 8px;
        }
        .pc-tooltip-dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: #ff4d4d;
            box-shadow: 0 0 6px #ff4d4d;
            flex-shrink: 0;
        }
        .pc-tooltip-title {
            font-size: 11px;
            font-weight: 700;
            color: rgba(255,255,255,0.45);
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }
        .pc-tooltip-name {
            font-size: 14px;
            font-weight: 800;
            color: #fff;
            margin-bottom: 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .pc-tooltip-time {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            padding: 6px 10px;
        }
        .pc-tooltip-time-icon {
            font-size: 14px;
            color: rgba(255,255,255,0.4);
        }
        .pc-tooltip-time-text {
            font-size: 13px;
            font-weight: 700;
            color: #fff;
            letter-spacing: 0.3px;
        }

        /* ── PC CONTEXT MENU ── */
        .pc-ctx-overlay {
            position: fixed; inset: 0; z-index: 9990;
            background: rgba(0,0,0,0.55); backdrop-filter: blur(2px); display: none;
        }
        .pc-ctx-overlay.visible { display: block; }
        .pc-ctx-menu {
            position: fixed; z-index: 9991; background: #111;
            border: 1px solid rgba(255,255,255,0.1); border-radius: 16px;
            padding: 8px; min-width: 200px; box-shadow: 0 16px 40px rgba(0,0,0,0.8);
            transform: scale(0.92) translateY(6px); opacity: 0;
            transition: opacity 0.15s ease, transform 0.15s ease; pointer-events: none;
        }
        .pc-ctx-menu.visible { opacity: 1; transform: scale(1) translateY(0); pointer-events: auto; }
        .pc-ctx-title {
            font-size: 11px; font-weight: 800; color: rgba(255,255,255,0.35);
            text-transform: uppercase; letter-spacing: 1px; padding: 6px 10px 10px;
        }
        .pc-ctx-btn {
            width: 100%; display: flex; align-items: center; gap: 10px;
            background: none; border: none; color: #fff; padding: 12px;
            border-radius: 10px; font-size: 13px; font-weight: 700; cursor: pointer;
            font-family: 'Montserrat', sans-serif; transition: background 0.15s; text-align: left;
        }
        .pc-ctx-btn:hover { background: rgba(255,255,255,0.07); }
        .pc-ctx-btn.turn-on     { color: #4CAF50; }
        .pc-ctx-btn.turn-off    { color: #ff6b6b; }
        .pc-ctx-btn.delete-book { color: #ff9800; }
        .pc-ctx-btn .material-symbols-outlined { font-size: 18px; }
        .pc-ctx-divider { height: 1px; background: rgba(255,255,255,0.07); margin: 4px 0; }

        /* Confirm delete modal */
        .del-modal-overlay {
            position: fixed; inset: 0; z-index: 9995;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
            display: none; align-items: center; justify-content: center;
        }
        .del-modal-overlay.visible { display: flex; }
        .del-modal {
            background: #111; border: 1px solid rgba(255,100,0,0.3);
            border-radius: 18px; padding: 24px 20px 20px;
            min-width: 280px; max-width: 320px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
        }
        .del-modal-icon { font-size: 32px; text-align: center; margin-bottom: 12px; }
        .del-modal-title { font-size: 15px; font-weight: 800; text-align: center; margin-bottom: 6px; }
        .del-modal-sub { font-size: 12px; color: rgba(255,255,255,0.45); text-align: center; margin-bottom: 18px; line-height: 1.5; }
        .del-modal-booking {
            background: rgba(255,255,255,0.05); border-radius: 10px;
            padding: 10px 14px; margin-bottom: 16px;
        }
        .del-modal-booking-name { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
        .del-modal-booking-time { font-size: 12px; color: rgba(255,255,255,0.5); display: flex; align-items: center; gap: 6px; }
        .del-modal-btns { display: flex; gap: 10px; }
        .del-modal-cancel {
            flex: 1; padding: 13px; background: rgba(255,255,255,0.06);
            border: none; border-radius: 12px; color: #fff;
            font-size: 13px; font-weight: 700; cursor: pointer;
            font-family: 'Montserrat', sans-serif; transition: 0.2s;
        }
        .del-modal-cancel:active { background: rgba(255,255,255,0.12); }
        .del-modal-confirm {
            flex: 1; padding: 13px; background: #8b1a1a;
            border: none; border-radius: 12px; color: #fff;
            font-size: 13px; font-weight: 700; cursor: pointer;
            font-family: 'Montserrat', sans-serif; transition: 0.2s;
        }
        .del-modal-confirm:active { background: #a32424; transform: scale(0.97); }

        /* ── TOAST ── */
        .toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; }
        .toast {
            background: #1a1a1a; color: #fff;
            padding: 14px 18px; border-radius: 12px; margin-bottom: 10px;
            border-left: 4px solid #8b1a1a;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            display: flex; align-items: center; gap: 10px;
            font-size: 13px; font-weight: 700; min-width: 250px;
            animation: slideIn 0.3s ease-out forwards;
        }
        .toast.success { border-left-color: #4CAF50; }
        @keyframes slideIn { from { transform: translateX(120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes slideOut { to { transform: translateX(120%); opacity: 0; } }
    </style>
</head>
<body>

<script>
// ... (Скрипты остаются прежними до функции initCalendar) ...

const API_URL    = 'https://subopposite-nonheretical-brynn.ngrok-free.dev';
const WS_URL     = 'wss://subopposite-nonheretical-brynn.ngrok-free.dev';
const params     = new URLSearchParams(window.location.search);
const clubId     = params.get('club_id');

if (!clubId) { window.location.href = 'admin_select_time.html'; }

function getNowTime() {
    const d = new Date();
    return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}
function getTimeInThreeHours() {
    const d = new Date(Date.now() + 3 * 60 * 60 * 1000);
    return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}
function getTodayISO() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function addDayISO(iso) {
    const d = new Date(iso);
    d.setDate(d.getDate() + 1);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

let startTime = getNowTime();
let endTime   = getTimeInThreeHours();
let selectedDateStr    = getTodayISO();
let selectedEndDateStr = getTodayISO();

let selected         = [];
let availabilityData = [];
let ws               = null;
let wsConnected      = false;
let timeConfirmed    = false;

function logout() { localStorage.clear(); window.location.href = 'check.html'; }

function showToast(message, type = 'error') {
    let container = document.querySelector('.toast-container');
    if (!container) {
        container = document.createElement('div');
        container.className = 'toast-container';
        document.body.appendChild(container);
    }
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.innerHTML = `<span class="material-symbols-outlined">${type === 'success' ? 'check_circle' : 'info'}</span> ${message}`;
    container.appendChild(toast);
    setTimeout(() => {
        toast.style.animation = 'slideOut 0.4s ease-in forwards';
        setTimeout(() => toast.remove(), 400);
    }, 3000);
}

const api = axios.create({ baseURL: API_URL, headers: { "ngrok-skip-browser-warning": "69420" } });
api.interceptors.request.use(cfg => {
    const t = localStorage.getItem('access_token');
    if (t) cfg.headers.Authorization = `Bearer ${t}`;
    return cfg;
});
api.interceptors.response.use(r => r, async err => {
    const orig = err.config;
    if (err.response?.status === 401 && !orig._retry) {
        orig._retry = true;
        const rt = localStorage.getItem('refresh_token');
        if (rt) {
            try {
                const r = await axios.post(`${API_URL}/auth/refresh`, {}, {
                    headers: { "Authorization": `Bearer ${rt}`, "ngrok-skip-browser-warning": "69420" }
                });
                localStorage.setItem('access_token', r.data.access_token);
                orig.headers.Authorization = `Bearer ${r.data.access_token}`;
                return api(orig);
            } catch { logout(); }
        } else { logout(); }
    }
    return Promise.reject(err);
});

// ── PC Toggle (включить / выключить) ──
let ctxCompId = null;
let ctxCompBookings = [];
let holdTimer = null;

function openCtxMenu(el, comp) {
    ctxCompId = comp.id;
    ctxCompBookings = comp.bookings || [];
    document.getElementById('pcCtxTitle').textContent = `ПК №${comp.number}`;
    document.getElementById('pcCtxTurnOn').style.display  = comp.is_Active ? 'none' : 'flex';
    document.getElementById('pcCtxTurnOff').style.display = comp.is_Active ? 'flex' : 'none';

    // Показываем кнопку удаления если есть брони
    const hasBookings = ctxCompBookings.length > 0;
    document.getElementById('pcCtxDeleteBook').style.display = hasBookings ? 'flex' : 'none';
    document.getElementById('pcCtxDelDivider').style.display = hasBookings ? 'block' : 'none';

    const menu = document.getElementById('pcCtxMenu');
    const rect = el.getBoundingClientRect();
    let left = rect.left + rect.width / 2 - 100;
    let top  = rect.top - 140;
    if (top < 8) top = rect.bottom + 8;
    if (left < 8) left = 8;
    if (left + 200 > window.innerWidth - 8) left = window.innerWidth - 208;
    menu.style.left = left + 'px';
    menu.style.top  = top  + 'px';
    document.getElementById('pcCtxOverlay').classList.add('visible');
    requestAnimationFrame(() => menu.classList.add('visible'));
}

function openDeleteModal() {
    closeCtxMenu();
    if (!ctxCompBookings || ctxCompBookings.length === 0) return;
    const b = ctxCompBookings[0];
    document.getElementById('delModalName').textContent = b.full_name;
    document.getElementById('delModalTime').textContent = `${formatTime(b.start_time)} – ${formatTime(b.end_time)}`;
    document.getElementById('delModalConfirmBtn').textContent = 'Удалить';
    document.getElementById('delModalConfirmBtn').disabled = false;
    document.getElementById('delModalOverlay').classList.add('visible');
}

function closeDeleteModal() {
    document.getElementById('delModalOverlay').classList.remove('visible');
}

async function confirmDeleteBooking() {
    if (!ctxCompBookings || ctxCompBookings.length === 0) return;
    const bookingId = ctxCompBookings[0].id;
    const btn = document.getElementById('delModalConfirmBtn');
    btn.textContent = 'Удаляем...';
    btn.disabled = true;
    try {
        await api.delete(`/bookings/${bookingId}/admin`, { params: { club_id: clubId } });
        closeDeleteModal();
        showToast('Бронирование удалено', 'success');
        connectWS();
    } catch (e) {
        btn.textContent = 'Удалить';
        btn.disabled = false;
        showToast(e.response?.data?.detail || 'Ошибка при удалении');
    }
}

function closeCtxMenu() {
    document.getElementById('pcCtxMenu').classList.remove('visible');
    document.getElementById('pcCtxOverlay').classList.remove('visible');
    ctxCompId = null;
}

async function togglePc(turnOn) {
    if (!ctxCompId) return;
    const compId = ctxCompId;
    closeCtxMenu();
    try {
        await api.post(`/computers/${compId}/${turnOn ? 'turn-on' : 'turn-off'}`);
        showToast(turnOn ? 'Компьютер включён' : 'Компьютер выключен', 'success');
        connectWS();
    } catch (e) {
        showToast(e.response?.data?.detail || 'Ошибка при переключении');
    }
}

function attachPcHold(el, comp) {
    el.addEventListener('contextmenu', (e) => { e.preventDefault(); openCtxMenu(el, comp); });
    el.addEventListener('pointerdown', () => { holdTimer = setTimeout(() => openCtxMenu(el, comp), 600); });
    el.addEventListener('pointerup',   () => clearTimeout(holdTimer));
    el.addEventListener('pointerleave',() => clearTimeout(holdTimer));
}

function connectWS() {
    if (ws) { ws.onclose = null; ws.close(); }
    const dot = document.getElementById('wsDot');
    dot.className = 'ws-dot pending';
    const startISO = `${selectedDateStr}T${startTime}:00`;
    const endISO   = `${selectedEndDateStr}T${endTime}:00`;
    const token    = localStorage.getItem('access_token');
    const wsPath = `${WS_URL}/${clubId}/availability/ws?start_time=${encodeURIComponent(startISO)}&end_time=${encodeURIComponent(endISO)}&token=${encodeURIComponent(token)}`;
    ws = new WebSocket(wsPath);
    ws.onopen = () => { dot.className = 'ws-dot connected'; wsConnected = true; };
    ws.onmessage = (event) => {
        try {
            const data = JSON.parse(event.data);
            availabilityData = Array.isArray(data) ? data : (data.zones || data.computers || []);
            const freeIds = new Set(
                availabilityData.flatMap(z => z.computers || [])
                    .filter(c => c.is_Active && c.bookings?.length === 0)
                    .map(c => c.id)
            );
            selected = selected.filter(s => freeIds.has(s.id));
            updateUI();
            renderMap();
        } catch (e) { console.error('WS parse error:', e); }
    };
    ws.onerror = () => { dot.className = 'ws-dot error'; wsConnected = false; fetchAvailabilityREST(); };
    ws.onclose = () => { dot.className = 'ws-dot error'; wsConnected = false; };
}

async function fetchAvailabilityREST() {
    const startISO = `${selectedDateStr}T${startTime}:00`;
    const endISO   = `${selectedEndDateStr}T${endTime}:00`;
    try {
        const res = await api.get(`/clubs/${clubId}/availability`, { params: { start_time: startISO, end_time: endISO } });
        availabilityData = res.data;
        const freeIds = new Set(
            availabilityData.flatMap(z => z.computers || [])
                .filter(c => c.is_Active && c.bookings?.length === 0)
                .map(c => c.id)
        );
        selected = selected.filter(s => freeIds.has(s.id));
        updateUI();
        renderMap();
    } catch (e) { console.error('Availability error:', e); }
}

function confirmTimeAndConnect() {
    const [sh, sm] = startTime.split(':').map(Number);
    const [eh, em] = endTime.split(':').map(Number);
    if (eh * 60 + em <= sh * 60 + sm) { selectedEndDateStr = addDayISO(selectedDateStr); } 
    else { selectedEndDateStr = selectedDateStr; }
    document.getElementById('timeLabel').innerText = `${startTime} – ${endTime}`;
    localStorage.setItem('booking_start_time', startTime);
    localStorage.setItem('booking_end_time', endTime);
    localStorage.setItem('booking_start_date', selectedDateStr);
    localStorage.setItem('booking_end_date', selectedEndDateStr);
    timeConfirmed = true;
    connectWS();
    showToast('Время обновлено', 'success');
}

function onTimeChanged() {
    document.getElementById('timeLabel').innerText = `${startTime} – ${endTime}`;
}

function formatTime(isoStr) {
    const d = new Date(isoStr);
    return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

const tooltip = document.getElementById ? null : null; // init later

function showPcTooltip(el, bookings) {
    const tt = document.getElementById('pcTooltip');
    const b = bookings[0];
    document.getElementById('tooltipName').textContent = b.full_name;
    document.getElementById('tooltipTime').textContent = `${formatTime(b.start_time)} – ${formatTime(b.end_time)}`;
    tt.classList.add('visible');
    movePcTooltip(el);
}

function movePcTooltip(el) {
    const tt = document.getElementById('pcTooltip');
    const rect = el.getBoundingClientRect();
    const ttW = 200;
    let left = rect.left + rect.width / 2 - ttW / 2;
    let top = rect.top - tt.offsetHeight - 10;
    if (top < 8) top = rect.bottom + 10;
    if (left < 8) left = 8;
    if (left + ttW > window.innerWidth - 8) left = window.innerWidth - ttW - 8;
    tt.style.left = left + 'px';
    tt.style.top = top + 'px';
}

function hidePcTooltip() {
    document.getElementById('pcTooltip').classList.remove('visible');
}

function renderMap() {
    const layer = document.getElementById('pcsLayer');
    layer.innerHTML = '';
    document.querySelectorAll('.dynamic-label').forEach(el => el.remove());
    const mapContainer = document.getElementById('clubMap');
    const PC_SIZE = 36; const PC_GAP = 8; const ZONE_GAP = 30;
    const START_X = 20; let currentY = 140;

    availabilityData.forEach(zone => {
        if (!zone.computers || zone.computers.length === 0) return;
        const lbl = document.createElement('div');
        lbl.className = 'label dynamic-label';
        lbl.style.top = (currentY - 18) + 'px';
        lbl.style.left = START_X + 'px';
        lbl.textContent = zone.name;
        mapContainer.appendChild(lbl);
        const isVip = zone.name.toLowerCase().includes('vip');
        zone.computers.forEach((comp, idx) => {
            const isOffline = !comp.is_Active;
            const isFree = comp.is_Active && comp.bookings && comp.bookings.length === 0;
            const isSelected = !!selected.find(s => s.id === comp.id);
            const el = document.createElement('div');
            el.className = `pc ${isFree ? 'free' : 'busy'}`;
            el.style.top = currentY + 'px';
            el.style.left = (START_X + idx * (PC_SIZE + PC_GAP)) + 'px';

            if (isOffline) {
                // Неактивный комп — offline иконка
                el.style.background = '#0d0d0d';
                el.style.borderColor = '#1a1a1a';
                el.style.cursor = 'default';
                el.style.opacity = '0.5';
                el.innerHTML = `<img src="../img/offline.png" style="width:20px;height:20px;object-fit:contain;opacity:0.6;" alt="offline">`;
                el.title = `ПК №${comp.number} — не активен`;
                attachPcHold(el, comp);
            } else if (!isFree) {
                el.innerText = comp.number;
                el.style.background = '#1a1a1a'; el.style.borderColor = '#2a2a2a'; el.style.color = '#333';
                if (comp.bookings && comp.bookings.length > 0) {
                    el.addEventListener('mouseenter', () => showPcTooltip(el, comp.bookings));
                    el.addEventListener('mouseleave', hidePcTooltip);
                    el.addEventListener('mousemove', () => movePcTooltip(el));
                }
                attachPcHold(el, comp);
            } else {
                el.innerText = comp.number;
                // Восстанавливаем визуал если комп уже был выбран
                if (isSelected) {
                    el.classList.add('selected');
                    el.style.background = '#8b1a1a';
                    el.style.borderColor = '#ff4d4d';
                    el.style.color = '#fff';
                } else {
                    el.style.background = isVip ? '#1a0a0a' : '#1a1a2e';
                    el.style.borderColor = isVip ? '#8b1a1a' : '#4a4a8a';
                    el.style.color = isVip ? '#ff6b6b' : '#aaaaff';
                }
                el.onclick = () => {
                    const i = selected.findIndex(s => s.id === comp.id);
                    if (i > -1) {
                        selected.splice(i, 1);
                        el.classList.remove('selected');
                        el.style.background = isVip ? '#1a0a0a' : '#1a1a2e';
                        el.style.borderColor = isVip ? '#8b1a1a' : '#4a4a8a';
                        el.style.color = isVip ? '#ff6b6b' : '#aaaaff';
                    } else {
                        if (selected.length >= 5) { showToast("Максимум 5 мест"); return; }
                        selected.push({ id: comp.id, n: comp.number, zid: zone.id, isVip });
                        el.classList.add('selected');
                        el.style.background = '#8b1a1a';
                        el.style.borderColor = '#ff4d4d';
                        el.style.color = '#fff';
                    }
                    updateUI();
                };
                attachPcHold(el, comp);
            }
            layer.appendChild(el);
        });
        currentY += PC_SIZE + ZONE_GAP;
    });
}

async function updateUI() {
    const btn = document.getElementById('confirmBtn');
    const label = document.getElementById('seatLabel');
    if (selected.length > 0) {
        const totalPrice = await calculatePrice();
        window.currentTotalPrice = totalPrice;
        const grouped = selected.reduce((acc, curr) => {
            const zone = curr.isVip ? "VIP" : "Стандарт";
            acc[zone] = acc[zone] || []; acc[zone].push(`№${curr.n}`);
            return acc;
        }, {});
        label.innerHTML = Object.entries(grouped).map(([z, nums]) => `${z} <b>${nums.join(', ')}</b>`).join('<br>') +
            `<br><span style="color:#4CAF50; font-size:16px;">К оплате: ${totalPrice} ₸</span>`;
        btn.classList.add('active');
    } else {
        label.innerHTML = '<span>не выбрано</span>';
        btn.classList.remove('active');
    }
}

async function calculatePrice() {
    if (selected.length === 0) return 0;
    const items = Object.entries(selected.reduce((acc, pc) => { acc[pc.zid] = (acc[pc.zid] || 0) + 1; return acc; }, {}))
        .map(([zid, count]) => ({ zone_id: parseInt(zid), count }));
    try {
        const res = await axios.post(`${API_URL}/pricing/calculate`, [{ items, start_time: `${selectedDateStr}T${startTime}:00`, end_time: `${selectedEndDateStr}T${endTime}:00` }]);
        return res.data.total_amount;
    } catch { return 0; }
}

async function handleBooking() {
    const btn = document.getElementById('confirmBtn');
    btn.innerText = "БРОНИРУЕМ...";
    try {
        const pricePerPc = window.currentTotalPrice / selected.length;
        const data = selected.map(s => ({
            "start_time": `${selectedDateStr}T${startTime}:00`, "end_time": `${selectedEndDateStr}T${endTime}:00`,
            "total_price": pricePerPc, "computer_id": s.id, "zone_id": s.zid, "club_id": parseInt(clubId)
        }));
        await api.post(`/bookings`, data);
        showToast("Успешно!", "success");
        setTimeout(() => { window.location.href = 'booking.html'; }, 1500);
    } catch (e) { 
        showToast(e.response?.data?.detail || "Ошибка");
        btn.innerText = "ПОДТВЕРДИТЬ БРОНИРОВАНИЕ";
    }
}

async function fetchClubInfo() {
    try {
        const r = await api.get(`/clubs/${clubId}`);
        document.getElementById('clubNameHeader').innerText = r.data.name;
        document.getElementById('clubAddrHeader').innerHTML = `<span class="material-symbols-outlined" style="font-size:12px">location_on</span> ${r.data.address}`;
    } catch {}
}

// ── Измененная логика календаря (ТОЛЬКО 3 ДНЯ) ──
function initCalendar() {
    const list = document.getElementById('dateSelector');
    const daysShort = ['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];
    list.innerHTML = '';

    // Меняем цикл с 7 на 3 дня
    for (let i = 0; i < 3; i++) {
        const d = new Date();
        d.setDate(d.getDate() + i);
        const iso = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;

        const item = document.createElement('div');
        item.className = `date-item ${iso === selectedDateStr ? 'active' : ''}`;
        
        // Добавим подписи: Сегодня, Завтра, Послезавтра
        let dayLabel = daysShort[d.getDay()];
        if (i === 0) dayLabel = "Сегодня";
        if (i === 1) dayLabel = "Завтра";

        item.innerHTML = `<span>${dayLabel}</span><b>${d.getDate()}</b>`;

        item.onclick = () => {
            document.querySelectorAll('.date-item').forEach(el => el.classList.remove('active'));
            item.classList.add('active');
            selectedDateStr = iso;
            onTimeChanged();
        };

        list.appendChild(item);
    }
}

document.addEventListener('DOMContentLoaded', async () => {
    try {
        const me = await api.get('/users/me');
        if (me.data.staff_role !== 'admin') { window.location.href = 'mainpage.html'; return; }
    } catch { window.location.href = 'check.html'; return; }

    document.getElementById('pickerStart').value = startTime;
    document.getElementById('pickerEnd').value   = endTime;
    document.getElementById('pickerStart').onchange = (e) => { startTime = e.target.value; onTimeChanged(); };
    document.getElementById('pickerEnd').onchange = (e) => { endTime = e.target.value; onTimeChanged(); };

    fetchClubInfo();
    initCalendar();
    document.getElementById('timeLabel').innerText = `${startTime} – ${endTime}`;
    timeConfirmed = true;
    connectWS();
});
</script>
