<!DOCTYPE html>
<html lang="ru">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Вход</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: Arial, Helvetica, sans-serif;
}

html,body{
height:100%;
overflow:hidden;
color:white;
}

body{
display:flex;
justify-content:center;
align-items:center;
background:#000;
position:relative;
}

body::before{
content:"";
position:absolute;
top:-40px;
left:-40px;
right:-40px;
bottom:-40px;
background: url("../img/bg.png") center/cover no-repeat;
filter: blur(8px) brightness(0.2);
z-index:-1;
}

.container{
width:340px;
display:flex;
flex-direction:column;
}

.logo{
display:flex;
justify-content:center;
margin-bottom:50px;
}

.logo img{
width:170px;
}

.field{
display:flex;
flex-direction:column;
margin-bottom:20px;
font-size:15px;
}

.field input{
margin-top:8px;
padding:14px;
border-radius:10px;
border:1px solid #aaa;
background:transparent;
color:white;
font-size:16px;
outline:none;
}

.field input::placeholder{
color:#ccc;
}

.forgot{
font-size:13px;
text-align:right;
margin-bottom:30px;
color:#cfcfcf;
text-decoration:none;
display:block;
}

.forgot:hover{
text-decoration:underline;
}

button{
width:100%;
padding:16px;
border-radius:14px;
border:none;
font-size:16px;
cursor:pointer;
}

.login{
background:#e9e9e9;
color:#000;
margin-bottom:25px;
box-shadow:
0 4px 8px rgba(0,0,0,0.25),
inset 0 1px 0 rgba(255,255,255,0.6);
}

.register{
background:none;
color:white;
font-size:17px;
}

button:active{
transform:scale(0.97);
}

</style>

</head>

<body>

<div class="container">

<div class="logo">
<img src="../img/Frame 6.svg" alt="logo">
</div>

<form id="loginForm">

<div class="field">
<label>Номер телефона</label>
<input name="phone" type="tel" placeholder="+7">
</div>

<div class="field">
<label>Пароль</label>
<input name="password" type="password">
</div>

<a href="forgot-1.html" class="forgot">Забыли пароль?</a>

<div id="errorMessage" style="color:#ff6b6b; margin-bottom:15px; font-size:14px;"></div>

<button class="login" type="submit">Войти</button>

<button class="register" id="createAccount" type="button">
Создайте аккаунт
</button>

</form>

</div>

<script>

const form = document.getElementById("loginForm");
const errorDiv = document.getElementById("errorMessage");
const createAccount = document.getElementById("createAccount");

form.addEventListener("submit", async (e) => {
    e.preventDefault();

    errorDiv.textContent = "";
    errorDiv.style.color = "#ff6b6b";

    const phone = form.phone.value;
    const password = form.password.value;

    try {
        // Шаг 1: логин, получаем токены
        const res = await fetch("https://subopposite-nonheretical-brynn.ngrok-free.dev/auth/login", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "ngrok-skip-browser-warning": "69420"
            },
            body: JSON.stringify({
                phone_number: phone,
                password: password
            })
        });

        const data = await res.json();

        if (!res.ok) {
            errorDiv.textContent = data.detail || "Ошибка входа";
            return;
        }

        localStorage.setItem('access_token', data.access_token);
        localStorage.setItem('refresh_token', data.refresh_token);
        localStorage.setItem('user_phone', phone);
        localStorage.removeItem('user_full_name');

        errorDiv.style.color = "#4cff88";
        errorDiv.textContent = "Успешно! Входим...";

        // Шаг 2: проверяем роль через /users/me
        setTimeout(async () => {
            try {
                const meRes = await fetch("https://subopposite-nonheretical-brynn.ngrok-free.dev/users/me", {
                    headers: {
                        "Authorization": `Bearer ${data.access_token}`,
                        "ngrok-skip-browser-warning": "69420"
                    }
                });
                const me = await meRes.json();

                if (me.staff_role === "admin" && me.club_ids && me.club_ids.length > 0) {
                    // Сохраняем club_id для admin страниц
                    localStorage.setItem('admin_club_id', me.club_ids[0]);
                    // Перенаправляем на admin_select_seat вместо admin_select_time
                    window.location.href = "admin_select_seat.html?club_id=" + me.club_ids[0];
                } else {
                    window.location.href = "mainpage.html";
                }
            } catch (err) {
                console.error("❌ Ошибка получения роли:", err);
                // Fallback — идём на обычную главную
                window.location.href = "mainpage.html";
            }
        }, 600);

    } catch (err) {
        console.error("❌ Ошибка запроса:", err);
        errorDiv.textContent = "Сервер недоступен или ошибка сети";
    }
});

createAccount.addEventListener("click", () => {
    window.location.href = "register-step1.html";
});

</script>

</body>
</html>
