<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Underlie - Профиль</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        :root {
            --bg-dark: #333333;
            --bg-light: #cccccc;
            --field-bg: #2d2d2d;
            --text-main: #ffffff;
            --danger: #ff453a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex; justify-content: center;
            min-height: 100vh; overflow-x: hidden;
        }

        /* --- БУРГЕР И МЕНЮ --- */
        .burger-menu { background: none; border: none; display: flex; flex-direction: column; gap: 5px; cursor: pointer; z-index: 1001; }
        .burger-bar { width: 25px; height: 2px; background-color: #fff; transition: 0.3s; }
        .burger-menu.open .burger-bar:nth-child(1) { transform: translateY(7px) rotate(45deg); }
        .burger-menu.open .burger-bar:nth-child(2) { opacity: 0; }
        .burger-menu.open .burger-bar:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

        .side-drawer {
            position: fixed; top: 0; left: 0; width: 280px; height: 100vh;
            background-color: #2d2d2d; z-index: 1000; transform: translateX(-100%);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column; box-shadow: 10px 0 30px rgba(0,0,0,0.5);
        }
        .side-drawer.open { transform: translateX(0); }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; z-index: 999; }
        .overlay.active { display: block; }

        .user-block { padding: 60px 25px 30px; background-color: #262626; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .user-name { font-weight: 700; color: #fff; display: block; }
        .user-phone { font-size: 0.8rem; color: #888; margin-top: 5px; display: block; }
        .drawer-nav { display: flex; flex-direction: column; }
        .drawer-link { display: flex; align-items: center; padding: 18px 25px; color: #fff; text-decoration: none; font-size: 0.95rem; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .drawer-link span { margin-right: 15px; color: #888; }

        /* --- КОНТЕЙНЕР ПРОФИЛЯ --- */
        .phone-container { width: 100%; max-width: 430px; display: flex; flex-direction: column; padding: 20px; min-height: 100vh; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0 40px; }
        .header h1 { font-size: 22px; font-weight: 700; }
        .icon-btn { background: none; border: none; cursor: pointer; color: var(--text-main); display: flex; align-items: center; padding: 5px; }

        .section-title { color: var(--bg-light); font-size: 12px; font-weight: 700; margin-bottom: 25px; text-transform: uppercase; letter-spacing: 1.5px; opacity: 0.7; }

        .field-group { position: relative; margin-bottom: 25px; }
        .field-group label {
            position: absolute; top: -10px; left: 12px;
            background-color: var(--bg-dark); padding: 0 8px;
            font-size: 11px; font-weight: 700; color: var(--bg-light); z-index: 1;
        }
        .field-group input {
            width: 100%; background: var(--field-bg); border: 1px solid #444; border-radius: 12px;
            padding: 16px; color: white; font-size: 16px; outline: none;
        }

        .delete-btn {
            width: 100%; background: transparent; border: 1.5px solid var(--danger); color: var(--danger);
            padding: 18px; border-radius: 15px; font-size: 14px; font-weight: 700;
            margin-top: auto; margin-bottom: 20px; cursor: pointer; transition: 0.3s;
        }
        .delete-btn:active { background: rgba(255, 69, 58, 0.1); }

        /* --- МОДАЛЬНОЕ ОКНО (DELETE) --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.75); backdrop-filter: blur(10px);
            display: none; justify-content: center; align-items: center; z-index: 2000; padding: 20px;
        }
        .modal-overlay.active { display: flex; }
        .modal-card {
            background: #262626; width: 100%; max-width: 320px; padding: 30px;
            border-radius: 28px; text-align: center; border: 1px solid rgba(255,255,255,0.05);
            animation: modalIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes modalIn {
            from { opacity: 0; transform: translateY(20px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .modal-icon { font-size: 48px; color: var(--danger); margin-bottom: 15px; }
        .modal-card h2 { font-size: 18px; margin-bottom: 12px; }
        .modal-card p { font-size: 14px; color: #888; line-height: 1.5; margin-bottom: 25px; }
        .modal-actions { display: flex; flex-direction: column; gap: 10px; }
        .m-btn { padding: 16px; border-radius: 14px; border: none; font-weight: 700; font-size: 14px; cursor: pointer; }
        .m-confirm { background: var(--danger); color: white; }
        .m-cancel { background: transparent; color: white; }

        @media (max-width: 768px) { .phone-container { padding: 15px; } }
    </style>
</head>
<body>

<div class="overlay" id="overlay"></div>

<div class="modal-overlay" id="deleteModal">
    <div class="modal-card">
        <span class="material-symbols-outlined modal-icon">heart_broken</span>
        <h2>Удалить аккаунт?</h2>
        <p>Вы потеряете доступ ко всем своим бронированиям и данным. Это действие необратимо.</p>
        <div class="modal-actions">
            <button class="m-btn m-confirm" id="confirmDeleteBtn">Да, удалить</button>
            <button class="m-btn m-cancel" id="cancelDeleteBtn">Отмена</button>
        </div>
    </div>
</div>

<nav class="side-drawer" id="sideDrawer">
    <div class="user-block">
        <span class="user-name" id="drawer_name">Загрузка...</span>
        <span class="user-phone" id="drawer_phone">...</span>
    </div>  
    <div class="drawer-nav">
        <a href="mainpage.html" class="drawer-link"><span class="material-symbols-outlined">home</span> Главная</a>
        <a href="map.html" class="drawer-link"><span class="material-symbols-outlined">search</span> Карта клубов</a>
        <a href="booking.html" class="drawer-link"><span class="material-symbols-outlined">diamond</span> Бронь</a>
        <a href="settings.html" class="drawer-link"><span class="material-symbols-outlined">settings</span> Настройки</a>
    </div>
</nav>

<div class="phone-container">
    <div class="header">
        <button class="burger-menu" id="burger">
            <span class="burger-bar"></span>
            <span class="burger-bar"></span>
            <span class="burger-bar"></span>
        </button>
        <h1>Профиль</h1>
        <button class="icon-btn" onclick="window.location.href='profile_edit.html'">
            <span class="material-symbols-outlined">edit_square</span>
        </button>
    </div>

    <p class="section-title">Аккаунт</p>

    <div class="field-group">
        <label>Имя</label>
        <input type="text" id="full_name" readonly value="Загрузка...">
    </div>

    <div class="field-group">
        <label>Номер телефона</label>
        <input type="text" id="phone_number" readonly value="...">
    </div>

    <div class="field-group">
        <label>Город</label>
        <input type="text" id="city" readonly value="...">
    </div>

    <button class="delete-btn" id="openDeleteModal">Удалить аккаунт</button>
</div>

<script>
    const API_URL = 'https://subopposite-nonheretical-brynn.ngrok-free.dev';
    
    const api = axios.create({
        baseURL: API_URL,
        headers: { "ngrok-skip-browser-warning": "69420" }
    });

    api.interceptors.request.use(config => {
        const token = localStorage.getItem('access_token');
        if (token) config.headers.Authorization = `Bearer ${token}`;
        return config;
    });

    api.interceptors.response.use(
        (response) => response,
        async (error) => {
            const originalRequest = error.config;
            if (error.response?.status === 401 && !originalRequest._retry) {
                originalRequest._retry = true;
                const refreshToken = localStorage.getItem('refresh_token');
                if (refreshToken) {
                    try {
                        const res = await axios.post(`${API_URL}/auth/refresh`, {}, {
                            headers: { "Authorization": `Bearer ${refreshToken}`, "ngrok-skip-browser-warning": "69420" }
                        });
                        localStorage.setItem('access_token', res.data.access_token);
                        originalRequest.headers.Authorization = `Bearer ${res.data.access_token}`;
                        return api(originalRequest);
                    } catch (e) { localStorage.clear(); window.location.href = 'check.html'; }
                } else { window.location.href = 'check.html'; }
            }
            return Promise.reject(error);
        }
    );

    async function getProfile() {
        try {
            const res = await api.get('/users/me');
            const user = res.data;
            document.getElementById('full_name').value = user.full_name || "Не указано";
            document.getElementById('phone_number').value = user.phone_number || "Не указан";
            document.getElementById('city').value = user.city || "Не указан";
            document.getElementById('drawer_name').innerText = user.full_name || "Пользователь";
            document.getElementById('drawer_phone').innerText = user.phone_number || "";
        } catch (error) { console.error("Ошибка профиля:", error); }
    }

    // --- ЛОГИКА МОДАЛКИ И УДАЛЕНИЯ ---
    const modal = document.getElementById('deleteModal');
    
    document.getElementById('openDeleteModal').onclick = () => modal.classList.add('active');
    document.getElementById('cancelDeleteBtn').onclick = () => modal.classList.remove('active');

    document.getElementById('confirmDeleteBtn').onclick = async () => {
        const btn = document.getElementById('confirmDeleteBtn');
        try {
            btn.innerText = "Удаляем...";
            btn.disabled = true;
            await api.delete('/users/delete_user');
            localStorage.clear();
            window.location.href = 'check.html';
        } catch (error) {
            alert("Ошибка при удалении. Попробуйте позже.");
            btn.innerText = "Да, удалить";
            btn.disabled = false;
            modal.classList.remove('active');
        }
    };

    // Бургер
    const burgerBtn = document.getElementById('burger');
    const sideDrawer = document.getElementById('sideDrawer');
    const overlay = document.getElementById('overlay');
    function toggleMenu() {
        burgerBtn.classList.toggle('open');
        sideDrawer.classList.toggle('open');
        overlay.classList.toggle('active');
    }
    burgerBtn.onclick = toggleMenu;
    overlay.onclick = toggleMenu;

    document.addEventListener('DOMContentLoaded', getProfile);
</script>
</body>
</html>
