<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Underlie - Профиль</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        :root {
            --bg-dark: #333333;
            --bg-light: #cccccc;
            --field-bg: #2d2d2d;
            --text-main: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- БУРГЕР И МЕНЮ --- */
        .burger-menu { background: none; border: none; display: flex; flex-direction: column; gap: 5px; cursor: pointer; z-index: 1001; }
        .burger-bar { width: 25px; height: 2px; background-color: #fff; transition: 0.3s; }
        .burger-menu.open .burger-bar:nth-child(1) { transform: translateY(7px) rotate(45deg); }
        .burger-menu.open .burger-bar:nth-child(2) { opacity: 0; }
        .burger-menu.open .burger-bar:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

        .side-drawer {
            position: fixed; top: 0; left: 0; width: 280px; height: 100vh;
            background-color: #2d2d2d; z-index: 1000; transform: translateX(-100%);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column; box-shadow: 10px 0 30px rgba(0,0,0,0.5);
        }
        .side-drawer.open { transform: translateX(0); }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; z-index: 999; }
        .overlay.active { display: block; }

        .user-block { padding: 60px 25px 30px; background-color: #262626; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .user-name { font-weight: 700; color: #fff; display: block; }
        .user-phone { font-size: 0.8rem; color: #888; margin-top: 5px; display: block; }
        .drawer-nav { display: flex; flex-direction: column; }
        .drawer-link { display: flex; align-items: center; padding: 18px 25px; color: #fff; text-decoration: none; font-size: 0.95rem; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .drawer-link span { margin-right: 15px; color: #888; }

        /* --- КОНТЕЙНЕР ПРОФИЛЯ --- */
        .phone-container {
            width: 100%;
            max-width: 430px;
            display: flex;
            flex-direction: column;
            padding: 20px;
            min-height: 100vh;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0 40px;
        }

        .header h1 { font-size: 22px; font-weight: 700; }

        .icon-btn { background: none; border: none; cursor: pointer; color: var(--text-main); display: flex; align-items: center; padding: 5px; }

        .section-title {
            color: var(--bg-light);
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .field-group { position: relative; margin-bottom: 25px; }

        .field-group label {
            position: absolute; top: -10px; left: 12px;
            background-color: var(--bg-dark);
            padding: 0 8px; font-size: 12px; font-weight: 700;
            color: var(--bg-light); z-index: 1;
        }

        .field-group input {
            width: 100%; background: var(--field-bg);
            border: 1px solid #555; border-radius: 12px;
            padding: 16px; color: white; font-size: 16px; outline: none;
        }

        .delete-btn {
            width: 100%; background: transparent;
            border: 2px solid #ff453a; color: #ff453a;
            padding: 18px; border-radius: 15px;
            font-size: 16px; font-weight: 700;
            margin-top: auto; margin-bottom: 20px;
            cursor: pointer; transition: 0.3s;
        }

        @media (max-width: 768px) {
            .phone-container { padding: 15px; }
            .field-group input { padding: 14px; font-size: 0.95rem; }
        }
    </style>
</head>
<body>

<div class="overlay" id="overlay"></div>

<nav class="side-drawer" id="sideDrawer">
    <div class="user-block">
        <span class="user-name" id="drawer_name">Загрузка...</span>
        <span class="user-phone" id="drawer_phone">...</span>
    </div>  
    <div class="drawer-nav">
        <a href="mainpage.html" class="drawer-link">
            <span class="material-symbols-outlined">home</span> Главная
        </a>
        <a href="map.html" class="drawer-link">
            <span class="material-symbols-outlined">search</span> Карта клубов
        </a>
        <a href="booking.html" class="drawer-link">
            <span class="material-symbols-outlined">diamond</span> Бронь
        </a>
        <a href="settings.html" class="drawer-link">
            <span class="material-symbols-outlined">settings</span> Настройки
        </a>
    </div>
</nav>

<div class="phone-container">
    <div class="header">
        <button class="burger-menu" id="burger">
            <span class="burger-bar"></span>
            <span class="burger-bar"></span>
            <span class="burger-bar"></span>
        </button>
        <h1>Профиль</h1>
        <button class="icon-btn" onclick="window.location.href='profile_edit.html'">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
            </svg>
        </button>
    </div>

    <p class="section-title">Аккаунт</p>

    <div class="field-group">
        <label>Имя</label>
        <input type="text" id="full_name" readonly value="Загрузка...">
    </div>

    <div class="field-group">
        <label>Номер телефона</label>
        <input type="text" id="phone_number" readonly value="...">
    </div>

    <div class="field-group">
        <label>Город</label>
        <input type="text" id="city" readonly value="...">
    </div>


    <button class="delete-btn">Удалить аккаунт</button>
</div>

<script>
    const API_URL = 'https://subopposite-nonheretical-brynn.ngrok-free.dev';
    
    const api = axios.create({
        baseURL: API_URL,
        headers: { "ngrok-skip-browser-warning": "69420" }
    });

    // 1. Интерцептор запроса
    api.interceptors.request.use(config => {
        const token = localStorage.getItem('access_token');
        if (token) config.headers.Authorization = `Bearer ${token}`;
        return config;
    });

    // 2. Интерцептор ответа для автоматического Refresh Token
    api.interceptors.response.use(
        (response) => response,
        async (error) => {
            const originalRequest = error.config;
            if (error.response?.status === 401 && !originalRequest._retry) {
                originalRequest._retry = true;
                const refreshToken = localStorage.getItem('refresh_token');
                if (refreshToken) {
                    try {
                        const res = await axios.post(`${API_URL}/auth/refresh`, {}, {
                            headers: { 
                                "Authorization": `Bearer ${refreshToken}`,
                                "ngrok-skip-browser-warning": "69420"
                            }
                        });
                        const newAccessToken = res.data.access_token;
                        localStorage.setItem('access_token', newAccessToken);
                        originalRequest.headers.Authorization = `Bearer ${newAccessToken}`;
                        return api(originalRequest);
                    } catch (refreshError) {
                        localStorage.clear();
                        window.location.href = 'check.html';
                    }
                } else {
                    window.location.href = 'check.html';
                }
            }
            return Promise.reject(error);
        }
    );

    async function getProfile() {
        try {
            const response = await api.get('/users/me');
            const user = response.data;
            
            // Основные поля
            document.getElementById('full_name').value = user.full_name || "Не указано";
            document.getElementById('phone_number').value = user.phone_number || "Не указан";
            document.getElementById('city').value = user.city || "Не указан";
            
            // Поля в боковом меню (Drawer)
            const drawerName = document.getElementById('drawer_name');
            const drawerPhone = document.getElementById('drawer_phone');
            if (drawerName) drawerName.innerText = user.full_name || "Пользователь";
            if (drawerPhone) drawerPhone.innerText = user.phone_number || "";

            // Обновляем локальное хранилище для кэша
            if(user.full_name) localStorage.setItem('user_full_name', user.full_name);
            if(user.phone_number) localStorage.setItem('user_phone', user.phone_number);
            
        } catch (error) {
            console.error("Ошибка при получении профиля:", error);
        }
    }

    const burgerBtn = document.getElementById('burger');
    const sideDrawer = document.getElementById('sideDrawer');
    const overlay = document.getElementById('overlay');

    function toggleMenu() {
        burgerBtn.classList.toggle('open');
        sideDrawer.classList.toggle('open');
        overlay.classList.toggle('active');
    }

    if (burgerBtn) burgerBtn.addEventListener('click', toggleMenu);
    if (overlay) overlay.addEventListener('click', toggleMenu);

    document.addEventListener('DOMContentLoaded', getProfile);
</script>
</body>
</html>
