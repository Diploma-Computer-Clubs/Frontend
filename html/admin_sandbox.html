<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Underlie — Схема зала</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<style>
:root {
  --bg: #333333;
  --surface: #2d2d2d;
  --card: #2a2a2a;
  --border: #444;
  --text: #fff;
  --muted: #888;
  --green: #00ff00;
  --green-dim: rgba(0,255,0,0.08);
  --danger: #ff453a;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Montserrat',sans-serif;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;}

/* TOPBAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:var(--surface);border-bottom:1px solid var(--border);z-index:200;gap:10px;flex-shrink:0;}
.topbar-left{display:flex;align-items:center;gap:10px;}
.back-btn{background:none;border:none;cursor:pointer;color:var(--text);font-size:20px;line-height:1;padding:2px;}
.back-btn:hover{color:var(--green);}
.topbar h1{font-size:15px;font-weight:700;text-transform:uppercase;letter-spacing:1px;}
.topbar-actions{display:flex;gap:8px;align-items:center;}

.btn{display:flex;align-items:center;gap:5px;padding:8px 14px;border-radius:9px;font-size:11px;font-weight:700;cursor:pointer;font-family:'Montserrat',sans-serif;text-transform:uppercase;letter-spacing:0.5px;border:1px solid;transition:0.2s;white-space:nowrap;}
.btn-green{background:var(--green-dim);border-color:var(--green);color:var(--green);}
.btn-green:hover{background:rgba(0,255,0,0.15);}
.btn-green:active{background:var(--green);color:#000;}
.btn-ghost{background:transparent;border-color:var(--border);color:var(--muted);}
.btn-ghost:hover{border-color:#666;color:var(--text);}
.btn:disabled{opacity:0.35;cursor:not-allowed;}

/* LAYOUT */
.layout{display:flex;flex:1;overflow:hidden;}

/* PANEL */
.panel{width:195px;min-width:195px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;padding:14px 10px;gap:11px;flex-shrink:0;}
.panel::-webkit-scrollbar{width:3px;}
.panel::-webkit-scrollbar-thumb{background:#444;border-radius:2px;}
.p-label{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;}
.p-divider{height:1px;background:var(--border);}

.stats-row{display:flex;gap:6px;}
.stat-pill{flex:1;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 4px;text-align:center;}
.stat-val{font-size:20px;font-weight:700;color:var(--green);}
.stat-lbl{font-size:8px;color:var(--muted);text-transform:uppercase;}

/* Zone chips */
.zone-chips{display:flex;flex-direction:column;gap:4px;}
.zone-chip{display:flex;align-items:center;gap:7px;padding:8px 9px;border-radius:9px;background:var(--card);border:1.5px solid transparent;cursor:pointer;transition:0.2s;}
.zone-chip:hover{border-color:#555;}
.zone-chip.sel{border-color:var(--green);background:var(--green-dim);}
.zone-chip.hid{opacity:0.4;}
.z-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.z-info{flex:1;min-width:0;}
.z-name{font-size:11px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.z-count{font-size:9px;color:var(--muted);}
.z-eye{background:none;border:none;cursor:pointer;color:var(--muted);font-size:15px;padding:0;line-height:1;}
.z-eye:hover{color:var(--text);}

.cols-row{display:flex;align-items:center;gap:7px;}
.cols-row label{font-size:10px;color:var(--muted);white-space:nowrap;}
.cols-input{width:46px;background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:4px 7px;font-size:12px;font-family:'Montserrat',sans-serif;text-align:center;}
.cols-input:focus{outline:none;border-color:var(--green);}
.cols-input:disabled{opacity:0.4;}

.add-pc-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:6px;padding:11px;border-radius:9px;border:1.5px dashed var(--green);background:var(--green-dim);color:var(--green);font-size:11px;font-weight:700;cursor:pointer;font-family:'Montserrat',sans-serif;text-transform:uppercase;transition:0.2s;}
.add-pc-btn.placing{border-style:solid;background:var(--green);color:#000;animation:glow 1.2s ease-in-out infinite;}
.add-pc-btn:disabled{opacity:0.3;cursor:not-allowed;border-style:dashed;background:transparent;color:var(--muted);animation:none;}
@keyframes glow{0%,100%{box-shadow:0 0 0 0 rgba(0,255,0,0.4)}50%{box-shadow:0 0 0 7px rgba(0,255,0,0)}}

.hint-box{background:rgba(255,200,0,0.06);border:1px solid rgba(255,200,0,0.2);color:#ffc800;border-radius:8px;padding:8px 9px;font-size:9px;line-height:1.65;display:none;}
.hint-box.show{display:block;}

.tips{font-size:9px;color:var(--muted);line-height:1.8;padding:0 2px;}

/* CANVAS */
.canvas-wrap{flex:1;position:relative;overflow:hidden;background:var(--bg);cursor:grab;}
.canvas-wrap.panning{cursor:grabbing;}
.canvas-wrap::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle,#3a3a3a 1px,transparent 1px);background-size:28px 28px;pointer-events:none;opacity:0.5;}
.canvas{position:absolute;transform-origin:0 0;}

/* ZONE BLOCK */
.zone-block{
  position:absolute;background:rgba(30,30,30,0.97);border:2px solid;border-radius:12px;
  padding:9px;cursor:grab;user-select:none;
  box-shadow:0 4px 20px rgba(0,0,0,0.5);transition:box-shadow 0.2s;
}
.zone-block:active{cursor:grabbing;}
.zone-block.dragging{box-shadow:0 14px 44px rgba(0,0,0,0.8);z-index:999;}

.zb-head{display:flex;align-items:center;gap:6px;margin-bottom:7px;pointer-events:none;}
.zb-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.zb-name{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;}

/* SEAT GRID */
.seat-grid{display:grid;gap:4px;}

.seat{
  width:36px;height:36px;border-radius:6px;border:1.5px solid;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;position:relative;transition:0.1s;flex-shrink:0;
}
.seat.occupied{cursor:default;}
.seat.empty{background:rgba(255,255,255,0.03);border-color:rgba(255,255,255,0.07);color:#2a2a2a;cursor:default;}
.seat.placeable{cursor:crosshair;color:#444;}
.seat.placeable:hover{background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.22);}
.seat-x{position:absolute;inset:0;background:rgba(220,40,40,0.88);border-radius:5px;display:none;align-items:center;justify-content:center;font-size:14px;color:#fff;cursor:pointer;}
.seat.occupied:hover .seat-x{display:flex;}

.add-row-btn{width:100%;margin-top:5px;padding:5px;border-radius:5px;border:1px dashed rgba(255,255,255,0.1);background:transparent;color:rgba(255,255,255,0.2);font-size:9px;font-weight:700;cursor:pointer;font-family:'Montserrat',sans-serif;text-transform:uppercase;transition:0.2s;}
.add-row-btn:hover{border-color:rgba(255,255,255,0.3);color:rgba(255,255,255,0.5);}

/* Zoom */
.zoom-ctrl{position:absolute;bottom:18px;right:18px;display:flex;flex-direction:column;gap:5px;z-index:100;}
.zoom-btn{width:34px;height:34px;background:var(--surface);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:0.2s;}
.zoom-btn:hover{background:var(--card);}

/* Toast */
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(80px);background:#111;border:1px solid var(--border);color:var(--text);padding:10px 18px;border-radius:10px;font-size:12px;font-weight:600;z-index:9999;transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1);white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,0.6);}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.green{border-color:var(--green);color:var(--green);}
.toast.red{border-color:var(--danger);color:var(--danger);}

/* Loading overlay */
.loading{position:fixed;inset:0;background:rgba(0,0,0,0.85);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;z-index:9998;}
.loading.hidden{display:none;}
.spinner{width:32px;height:32px;border:2px solid #444;border-top-color:var(--green);border-radius:50%;animation:spin 0.75s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{font-size:12px;color:var(--muted);}
.loading-err{color:var(--danger);font-size:13px;font-weight:700;text-align:center;max-width:260px;line-height:1.5;}
.retry-btn{margin-top:4px;padding:10px 22px;border-radius:8px;border:1px solid var(--green);background:var(--green-dim);color:var(--green);font-size:12px;font-weight:700;cursor:pointer;font-family:'Montserrat',sans-serif;}
</style>
</head>
<body>

<div class="loading" id="loading">
  <div class="spinner" id="spinner"></div>
  <div class="loading-txt" id="loadingTxt">Загрузка зон...</div>
  <div class="loading-err" id="loadingErr" style="display:none;"></div>
  <button class="retry-btn" id="retryBtn" style="display:none;" onclick="init()">Повторить</button>
</div>
<div class="toast" id="toast"></div>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-left">
    <button class="back-btn" onclick="history.back()">←</button>
    <h1>Схема зала</h1>
  </div>
  <div class="topbar-actions">
    <button class="btn btn-ghost" id="resetBtn">⊙ Сброс</button>
    <button class="btn btn-green" id="saveBtn">💾 Сохранить</button>
  </div>
</div>

<div class="layout">
  <div class="panel">
    <span class="p-label">Статистика</span>
    <div class="stats-row">
      <div class="stat-pill"><div class="stat-val" id="statPc">0</div><div class="stat-lbl">ПК</div></div>
      <div class="stat-pill"><div class="stat-val" id="statZones">0</div><div class="stat-lbl">Зон</div></div>
    </div>

    <div class="p-divider"></div>
    <span class="p-label">Зоны</span>
    <div class="zone-chips" id="zoneChips">
      <div style="color:var(--muted);font-size:11px;padding:4px;">—</div>
    </div>

    <div class="p-divider"></div>
    <span class="p-label">Выбранная зона</span>
    <div class="cols-row">
      <label>Столбцов:</label>
      <input class="cols-input" type="number" id="colsInput" value="6" min="1" max="20" disabled>
    </div>
    <button class="add-pc-btn" id="addPcBtn" disabled>
      <span>＋</span><span id="addLabel">Добавить ПК</span>
    </button>
    <div class="hint-box" id="hint">
      Кликни на пустой слот → добавишь ПК<br><br>
      ✕ на ПК → удалить<br>
      Тяни блок → переместить
    </div>

    <div class="p-divider"></div>
    <span class="p-label">Холст</span>
    <div class="tips">
      🖱 Колёсико — масштаб<br>
      🖐 Тяни фон — прокрутка<br>
      📦 Тяни блок — переставить
    </div>
  </div>

  <div class="canvas-wrap" id="wrap">
    <div class="canvas" id="canvas"></div>
    <div class="zoom-ctrl">
      <button class="zoom-btn" id="zoomIn">+</button>
      <button class="zoom-btn" id="zoomOut">−</button>
    </div>
  </div>
</div>

<script>
// ── AUTH ──
(function(){ if(!localStorage.getItem('access_token')) window.location.replace('check.html'); })();

const _BASE = 'https://subopposite-nonheretical-brynn.ngrok-free.dev';

// axios уже загружен через <script> выше
const _api = axios.create({ baseURL: _BASE, headers: { "ngrok-skip-browser-warning": "69420" } });

_api.interceptors.request.use(cfg => {
  const t = localStorage.getItem('access_token');
  if (t) cfg.headers.Authorization = `Bearer ${t}`;
  return cfg;
});

_api.interceptors.response.use(r => r, async err => {
  if (err.response?.status === 401 && !err.config._retry) {
    err.config._retry = true;
    const rt = localStorage.getItem('refresh_token');
    if (rt) {
      try {
        const r = await axios.post(`${_BASE}/auth/refresh`, {}, {
          headers: { Authorization: `Bearer ${rt}`, "ngrok-skip-browser-warning": "69420" }
        });
        localStorage.setItem('access_token', r.data.access_token);
        err.config.headers.Authorization = `Bearer ${r.data.access_token}`;
        return _api(err.config);
      } catch { localStorage.clear(); location.href = 'check.html'; }
    } else { localStorage.clear(); location.href = 'check.html'; }
  }
  return Promise.reject(err);
});

// ── COLORS ──
const COLORS = ['#00e5ff','#ff6b35','#a78bfa','#fbbf24','#34d399','#f472b6','#60a5fa','#4ade80','#fb923c','#e879f9','#38bdf8','#facc15'];

// ── STATE ──
let CLUB_ID = null;
let zones = [];
let activeId = null;
let placing = false;

// ── PAN/ZOOM ──
let scale = 1, px = 0, py = 0;
let panning = false, ps = {}, po = {};

const wrap = document.getElementById('wrap');
const canvas = document.getElementById('canvas');

function applyT() {
  canvas.style.transform = `translate(${px}px,${py}px) scale(${scale})`;
}

wrap.addEventListener('mousedown', e => {
  const t = e.target;
  if (t === wrap || t === canvas) {
    panning = true; ps = {x:e.clientX,y:e.clientY}; po = {x:px,y:py};
    wrap.classList.add('panning');
  }
});
window.addEventListener('mousemove', e => {
  if (!panning) return;
  px = po.x + (e.clientX - ps.x);
  py = po.y + (e.clientY - ps.y);
  applyT();
});
window.addEventListener('mouseup', () => { panning = false; wrap.classList.remove('panning'); });

wrap.addEventListener('wheel', e => {
  e.preventDefault();
  scale = Math.min(2.5, Math.max(0.25, scale + (e.deltaY > 0 ? -0.09 : 0.09)));
  applyT();
}, { passive: false });

document.getElementById('zoomIn').onclick = () => { scale = Math.min(2.5, scale + 0.15); applyT(); };
document.getElementById('zoomOut').onclick = () => { scale = Math.max(0.25, scale - 0.15); applyT(); };
document.getElementById('resetBtn').onclick = () => { scale = 1; px = 20; py = 20; applyT(); };

// ── TOAST ──
function toast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast ${type} show`;
  setTimeout(() => el.classList.remove('show'), 2800);
}

// ── RENDER ──
function renderAll() {
  canvas.innerHTML = '';
  zones.forEach(z => { if (z.visible !== false) renderBlock(z); });
  updateStats();
  renderPanel();
}

function updateStats() {
  document.getElementById('statPc').textContent = zones.reduce((s, z) => s + z.computers.length, 0);
  document.getElementById('statZones').textContent = zones.filter(z => z.visible !== false).length;
}

function renderBlock(zone) {
  const cols = zone.cols || 6;
  const extraRows = zone._extra || 0;
  const filledRows = Math.ceil((zone.computers.length + 1) / cols);
  const rows = Math.max(filledRows, 1) + extraRows;
  const total = rows * cols;

  const block = document.createElement('div');
  block.className = 'zone-block';
  block.id = `blk-${zone.id}`;
  block.style.left = (zone.bx || 40) + 'px';
  block.style.top = (zone.by || 40) + 'px';
  block.style.borderColor = zone.color;
  block.style.boxShadow = `0 0 0 1px ${zone.color}18, 0 4px 20px rgba(0,0,0,0.5)`;

  // Header
  const head = document.createElement('div');
  head.className = 'zb-head';
  head.innerHTML = `<div class="zb-dot" style="background:${zone.color};box-shadow:0 0 5px ${zone.color};"></div><div class="zb-name" style="color:${zone.color};">${zone.name}</div>`;
  block.appendChild(head);

  // Grid
  const grid = document.createElement('div');
  grid.className = 'seat-grid';
  grid.style.gridTemplateColumns = `repeat(${cols}, 36px)`;

  const occ = new Map();
  zone.computers.forEach((pc, i) => occ.set(i, pc));

  for (let i = 0; i < total; i++) {
    const seat = document.createElement('div');
    seat.className = 'seat';
    if (occ.has(i)) {
      const pc = occ.get(i);
      seat.classList.add('occupied');
      seat.style.background = zone.color;
      seat.style.borderColor = zone.color;
      seat.style.color = isDark(zone.color) ? '#fff' : '#000';
      seat.innerHTML = `<span>${pc.number}</span><div class="seat-x">✕</div>`;
      seat.querySelector('.seat-x').addEventListener('click', e => {
        e.stopPropagation();
        removePC(zone.id, i);
      });
    } else {
      seat.classList.add('empty');
      if (placing && zone.id === activeId) {
        seat.classList.add('placeable');
        seat.textContent = '+';
        seat.addEventListener('click', e => { e.stopPropagation(); addPC(zone.id, i); });
      }
    }
    grid.appendChild(seat);
  }
  block.appendChild(grid);

  // Add row button
  if (zone.id === activeId) {
    const ar = document.createElement('button');
    ar.className = 'add-row-btn';
    ar.textContent = '+ добавить ряд';
    ar.addEventListener('click', e => { e.stopPropagation(); zone._extra = (zone._extra || 0) + 1; renderAll(); });
    block.appendChild(ar);
  }

  canvas.appendChild(block);
  makeDraggable(block, zone);
}

function isDark(hex) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return (0.299*r + 0.587*g + 0.114*b) < 145;
}

// ── DRAG ──
function makeDraggable(block, zone) {
  let d = false, sx, sy, ox, oy;
  block.addEventListener('mousedown', e => {
    if (e.target.classList.contains('seat-x') || e.target.classList.contains('placeable') || e.target.classList.contains('add-row-btn') || e.target.tagName === 'SPAN') return;
    d = true; sx = e.clientX; sy = e.clientY; ox = zone.bx || 0; oy = zone.by || 0;
    block.classList.add('dragging'); e.stopPropagation();
  });
  window.addEventListener('mousemove', e => {
    if (!d) return;
    zone.bx = ox + (e.clientX - sx) / scale;
    zone.by = oy + (e.clientY - sy) / scale;
    block.style.left = zone.bx + 'px';
    block.style.top = zone.by + 'px';
  });
  window.addEventListener('mouseup', () => { if (d) { d = false; block.classList.remove('dragging'); } });

  // Touch
  block.addEventListener('touchstart', e => {
    if (e.target.classList.contains('seat-x') || e.target.classList.contains('placeable')) return;
    const t = e.touches[0]; d = true; sx = t.clientX; sy = t.clientY; ox = zone.bx||0; oy = zone.by||0;
    block.classList.add('dragging'); e.stopPropagation();
  }, {passive:true});
  window.addEventListener('touchmove', e => {
    if (!d) return;
    const t = e.touches[0];
    zone.bx = ox + (t.clientX - sx) / scale;
    zone.by = oy + (t.clientY - sy) / scale;
    block.style.left = zone.bx + 'px'; block.style.top = zone.by + 'px';
  }, {passive:true});
  window.addEventListener('touchend', () => { if (d) { d = false; block.classList.remove('dragging'); } });
}

// ── COMPUTERS ──
function addPC(zoneId, slotIdx) {
  const z = zones.find(z => z.id === zoneId); if (!z) return;
  const num = z.computers.length ? Math.max(...z.computers.map(p => p.number)) + 1 : 1;
  const cols = z.cols || 6;
  z.computers.splice(slotIdx, 0, { number: num, x: slotIdx % cols, y: Math.floor(slotIdx / cols), isNew: true, zone_id: zoneId });
  z.computers.forEach((p, i) => { p.number = i+1; p.x = i % cols; p.y = Math.floor(i / cols); });
  renderAll();
  toast(`ПК #${num} добавлен в «${z.name}»`, 'green');
}

function removePC(zoneId, slotIdx) {
  const z = zones.find(z => z.id === zoneId); if (!z) return;
  const pc = z.computers[slotIdx]; if (!pc) return;
  z.computers.splice(slotIdx, 1);
  const cols = z.cols || 6;
  z.computers.forEach((p, i) => { p.number = i+1; p.x = i % cols; p.y = Math.floor(i / cols); });
  renderAll();
}

// ── PANEL ──
function renderPanel() {
  const container = document.getElementById('zoneChips');
  container.innerHTML = '';
  if (!zones.length) {
    container.innerHTML = '<div style="color:var(--muted);font-size:11px;padding:4px;">Нет зон</div>';
    return;
  }
  zones.forEach(z => {
    const chip = document.createElement('div');
    chip.className = 'zone-chip' + (z.id === activeId ? ' sel' : '') + (z.visible === false ? ' hid' : '');
    chip.innerHTML = `
      <div class="z-dot" style="background:${z.color};box-shadow:0 0 5px ${z.color}80;"></div>
      <div class="z-info"><div class="z-name">${z.name}</div><div class="z-count">${z.computers.length} ПК</div></div>
      <button class="z-eye" data-id="${z.id}">${z.visible === false ? '🙈' : '👁'}</button>`;
    chip.addEventListener('click', e => {
      if (e.target.closest('.z-eye')) return;
      selectZone(z.id);
    });
    chip.querySelector('.z-eye').addEventListener('click', e => {
      e.stopPropagation();
      z.visible = z.visible === false ? true : false;
      renderAll();
    });
    container.appendChild(chip);
  });
}

function selectZone(id) {
  activeId = id;
  placing = false;
  const z = zones.find(z => z.id === id);
  const ci = document.getElementById('colsInput');
  if (z) { ci.value = z.cols || 6; ci.disabled = false; }
  setPlacing(false);
  renderAll();
}

function setPlacing(on) {
  placing = on;
  const btn = document.getElementById('addPcBtn');
  const hint = document.getElementById('hint');
  if (on) {
    btn.className = 'add-pc-btn placing';
    document.getElementById('addLabel').textContent = 'Отмена';
    hint.classList.add('show');
  } else {
    btn.className = 'add-pc-btn';
    document.getElementById('addLabel').textContent = 'Добавить ПК';
    hint.classList.remove('show');
    btn.disabled = !activeId;
  }
  renderAll();
}

document.getElementById('addPcBtn').addEventListener('click', () => {
  if (!activeId) { toast('Выберите зону', 'red'); return; }
  setPlacing(!placing);
});

document.getElementById('colsInput').addEventListener('change', e => {
  if (!activeId) return;
  const z = zones.find(z => z.id === activeId); if (!z) return;
  z.cols = Math.max(1, parseInt(e.target.value) || 6);
  renderAll();
});

// ── SAVE ──
document.getElementById('saveBtn').addEventListener('click', async () => {
  const btn = document.getElementById('saveBtn');
  const newPcs = [];
  zones.forEach(z => {
    z.computers.filter(p => p.isNew).forEach(pc => {
      newPcs.push({ number: pc.number, specification: "string", zone_id: z.id, x: pc.x, y: pc.y });
    });
  });
  if (!newPcs.length) { toast('Нет новых ПК для сохранения'); return; }
  btn.disabled = true;
  try {
    await _api.post('/computers/', newPcs, { params: { club_id: CLUB_ID } });
    zones.forEach(z => z.computers.forEach(p => p.isNew = false));
    toast(`✅ ${newPcs.length} ПК сохранено!`, 'green');
  } catch (err) {
    const d = err.response?.data?.detail;
    toast(`❌ ${typeof d === 'string' ? d : 'Ошибка ' + (err.response?.status || '?')}`, 'red');
  } finally { btn.disabled = false; }
});

// ── LOADING STATE ──
function showLoadingError(msg) {
  document.getElementById('spinner').style.display = 'none';
  document.getElementById('loadingTxt').style.display = 'none';
  const err = document.getElementById('loadingErr');
  err.textContent = msg;
  err.style.display = 'block';
  document.getElementById('retryBtn').style.display = 'inline-block';
}

function setLoadingText(txt) {
  document.getElementById('loadingTxt').textContent = txt;
}

// ── INIT ──
async function init() {
  // reset error state
  document.getElementById('spinner').style.display = '';
  document.getElementById('loadingTxt').style.display = '';
  document.getElementById('loadingErr').style.display = 'none';
  document.getElementById('retryBtn').style.display = 'none';
  document.getElementById('loading').classList.remove('hidden');

  try {
    setLoadingText('Получаем данные пользователя...');
    const urlParams = new URLSearchParams(location.search);

    let userRes;
    try {
      userRes = await _api.get('/users/me');
    } catch (e) {
      throw new Error('Не удалось получить данные пользователя. Проверь соединение.');
    }

    CLUB_ID = parseInt(urlParams.get('club_id'))
      || userRes.data.club_ids?.[0]
      || parseInt(localStorage.getItem('owner_club_id'))
      || null;

    if (CLUB_ID) localStorage.setItem('owner_club_id', CLUB_ID);

    if (!CLUB_ID) {
      // попробуем /clubs/ по owner_id
      try {
        setLoadingText('Ищем клуб...');
        const clubsRes = await _api.get('/clubs/', { params: { owner_id: userRes.data.id } });
        if (clubsRes.data.length > 0) {
          CLUB_ID = clubsRes.data[0].id;
          localStorage.setItem('owner_club_id', CLUB_ID);
        }
      } catch {}
    }

    if (!CLUB_ID) {
      throw new Error('Клуб не найден.\nПерейди сюда через панель управления или добавь ?club_id=ВАШ_ID в URL.');
    }

    setLoadingText('Загрузка зон...');
    let zonesData;
    try {
      const zonesRes = await _api.get('/zones/', { params: { club_id: CLUB_ID } });
      zonesData = zonesRes.data;
    } catch (e) {
      throw new Error(`Ошибка загрузки зон: ${e.response?.status || e.message}`);
    }

    if (!zonesData.length) {
      document.getElementById('loading').classList.add('hidden');
      toast('Зон нет. Сначала создай зоны.', 'red');
      document.getElementById('zoneChips').innerHTML = '<div style="color:var(--muted);font-size:11px;padding:4px;">Нет зон</div>';
      updateStats();
      return;
    }

    // Auto layout
    let bx = 30, by = 30;
    zones = zonesData.map((z, i) => {
      const color = COLORS[i % COLORS.length];
      const obj = { id: z.id, name: z.name, color, bx, by, cols: 6, computers: [], visible: true };
      bx += 280; if (bx > 1100) { bx = 30; by += 220; }
      return obj;
    });

    // Load computers
    setLoadingText(`Загрузка компьютеров (0/${zones.length})...`);
    for (let i = 0; i < zones.length; i++) {
      const zone = zones[i];
      setLoadingText(`Загрузка компьютеров (${i+1}/${zones.length})...`);
      try {
        const res = await _api.get('/computers/', { params: { zone_id: zone.id } });
        zone.computers = res.data.map(pc => ({ id: pc.id, number: pc.number, x: pc.x, y: pc.y, isNew: false, zone_id: zone.id }));
        zone.computers.sort((a, b) => a.number - b.number);
        const maxX = Math.max(0, ...zone.computers.map(p => p.x));
        if (maxX > 0) zone.cols = maxX + 1;
      } catch { /* зона без компов — ок */ }
    }

    px = 20; py = 20; applyT();
    renderAll();
    document.getElementById('loading').classList.add('hidden');

  } catch (err) {
    showLoadingError(err.message || 'Неизвестная ошибка');
  }
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
