<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мои брони — Underlie</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        :root {
            --bg-dark: #333333;
            --bg-light: #cccccc;
            --menu-bg: #2d2d2d;
            --card-bg: #1c1c1c;
            --text-main: #ffffff;
            --accent: #8b1a1a;
            --text-gray: #888888;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        body { background-color: var(--bg-light); color: var(--text-main); min-height: 100vh; }

        /* --- ХЕДЕР --- */
        .main-header {
            background-color: var(--bg-dark);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header-right { display: flex; align-items: center; gap: 15px; }
        .logo-box img { height: 36px; width: auto; display: block; }

        .burger-menu {
            background: none; border: none; display: flex;
            flex-direction: column; gap: 5px; cursor: pointer; z-index: 1001;
        }
        .burger-bar { width: 25px; height: 2px; background-color: #fff; transition: 0.3s; }
        .burger-menu.open .burger-bar:nth-child(1) { transform: translateY(7px) rotate(45deg); }
        .burger-menu.open .burger-bar:nth-child(2) { opacity: 0; }
        .burger-menu.open .burger-bar:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

        /* --- БОКОВОЕ МЕНЮ --- */
        .side-drawer {
            position: fixed; top: 0; left: 0; width: 280px; height: 100vh;
            background-color: var(--menu-bg); z-index: 1000;
            transform: translateX(-100%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column; box-shadow: 10px 0 30px rgba(0,0,0,0.5);
        }
        .side-drawer.open { transform: translateX(0); }
        .user-block { padding: 60px 25px 30px; background-color: #262626; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .user-name { font-weight: 700; font-size: 1.1rem; color: #fff; display: block; }
        .user-phone { font-size: 0.8rem; color: #888; margin-top: 5px; display: block; }

        .drawer-link { display: flex; align-items: center; padding: 18px 25px; color: #fff; text-decoration: none; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .drawer-link span { margin-right: 15px; color: #888; font-size: 22px; }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; z-index: 999; }
        .overlay.active { display: block; }

        /* --- КОНТЕНТ --- */
        .container { padding: 20px; max-width: 450px; margin: 0 auto; }
        .page-title { color: #333; font-size: 22px; font-weight: 700; margin-bottom: 25px; text-align: center; }

        .booking-card {
            background: var(--card-bg); border-radius: 20px; padding: 20px;
            margin-bottom: 20px; border-left: 5px solid var(--accent);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            position: relative; animation: slideUp 0.5s ease;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .delete-btn {
            position: absolute; top: 15px; right: 15px;
            background: rgba(255,255,255,0.1); border: none;
            color: #ff4d4d; cursor: pointer; width: 36px; height: 36px;
            border-radius: 10px; display: flex; align-items: center; justify-content: center;
            transition: 0.3s;
        }

        .club-name { font-size: 18px; font-weight: 700; color: var(--text-main); margin-bottom: 4px; }
        .club-address { font-size: 12px; color: var(--text-gray); margin-bottom: 15px; }

        .details-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .label { font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: 0.5px; }
        .value { font-size: 14px; font-weight: 600; color: #fff; margin-top: 2px; }
        .pc-badge { color: var(--accent); font-weight: 700; }

        .loader { text-align: center; color: #333; margin-top: 100px; font-weight: 700; }
        #empty-state { text-align: center; color: #666; margin-top: 100px; display: none; }
    </style>
</head>
<body>

<div class="overlay" id="overlay"></div>

<nav class="side-drawer" id="sideDrawer">
    <div class="user-block">
        <span class="user-name" id="drawer_name">Загрузка...</span>
        <span class="user-phone" id="drawer_phone">...</span>
    </div>  
    <div class="drawer-nav">
        <a href="mainpage.html" class="drawer-link"><span class="material-symbols-outlined">home</span> Главная</a>
        <a href="profile.html" class="drawer-link"><span class="material-symbols-outlined">account_circle</span> Профиль</a>
        <a href="map.html" class="drawer-link"><span class="material-symbols-outlined">search</span> Карта клубов</a>
    </div>
</nav>

<header class="main-header">
    <button class="burger-menu" id="burger">
        <span class="burger-bar"></span>
        <span class="burger-bar"></span>
        <span class="burger-bar"></span>
    </button>
    <div class="header-right">
        <div class="logo-box"><img src="../img/Frame 6.svg" alt="UNDERLIE"></div>
    </div>
</header>

<div class="container">
    <h1 class="page-title">Мои бронирования</h1>
    <div id="loader" class="loader">Синхронизация...</div>
    <div id="bookings-list"></div>
    <div id="empty-state">У вас пока нет активных бронирований.</div>
</div>

<script>
const API_URL = 'https://subopposite-nonheretical-brynn.ngrok-free.dev';

const api = axios.create({
    baseURL: API_URL,
    headers: { "ngrok-skip-browser-warning": "69420" }
});

api.interceptors.request.use(config => {
    const token = localStorage.getItem('access_token');
    if (token) config.headers.Authorization = `Bearer ${token}`;
    return config;
});

const burgerBtn = document.getElementById('burger');
const sideDrawer = document.getElementById('sideDrawer');
const overlay = document.getElementById('overlay');

function toggleMenu() {
    burgerBtn.classList.toggle('open');
    sideDrawer.classList.toggle('open');
    overlay.classList.toggle('active');
}
burgerBtn.addEventListener('click', toggleMenu);
overlay.addEventListener('click', toggleMenu);

async function syncProfile() {
    try {
        const response = await api.get('/users/me');
        const user = response.data;
        document.getElementById('drawer_name').innerText = user.full_name || "Пользователь";
        document.getElementById('drawer_phone').innerText = user.phone_number || "";
    } catch (err) { console.log("Profile sync skipped"); }
}

async function loadBookings() {
    const listElement = document.getElementById('bookings-list');
    const emptyState = document.getElementById('empty-state');
    const loader = document.getElementById('loader');

    try {
        const res = await api.get('/bookings/get_bookings');
        const bookings = Array.isArray(res.data) ? res.data : [];
        loader.style.display = 'none';

        if (bookings.length === 0) {
            emptyState.style.display = 'block';
            listElement.innerHTML = '';
            return;
        }

        const groups = {};
        bookings.forEach(b => {
            const zoneId = b.zone?.id || b.zone?.name || 'default';
            const key = `${b.club?.id}-${b.start_time}-${b.end_time}-${zoneId}`;

            if (!groups[key]) {
                groups[key] = {
                    club: b.club?.name || "UNDERLIE",
                    address: b.club?.address || "",
                    zone: b.zone?.name || "Стандарт",
                    start: new Date(b.start_time),
                    end: new Date(b.end_time),
                    pcs: [b.computer?.number],
                    ids: [b.id]
                };
            } else {
                groups[key].pcs.push(b.computer?.number);
                groups[key].ids.push(b.id);
            }
        });

        emptyState.style.display = 'none';
        
        const sortedGroups = Object.values(groups).sort((a, b) => b.start - a.start);

        listElement.innerHTML = sortedGroups.map(g => {
            const dateStr = g.start.toLocaleDateString('ru-RU');
            const timeStr = `${g.start.getHours().toString().padStart(2,'0')}:${g.start.getMinutes().toString().padStart(2,'0')} - ${g.end.getHours().toString().padStart(2,'0')}:${g.end.getMinutes().toString().padStart(2,'0')}`;
            const idsStr = JSON.stringify(g.ids);
            const pcsList = g.pcs.sort((a, b) => a - b).join(', ');
            
            return `
                <div class="booking-card">
                    <button class="delete-btn" onclick='confirmDelete(this, ${idsStr})'>
                        <span class="material-symbols-outlined">delete</span>
                    </button>
                    <div class="club-name">${g.club}</div>
                    <div class="club-address">${g.address}</div>
                    <div class="details-grid">
                        <div><div class="label">Дата</div><div class="value">${dateStr}</div></div>
                        <div><div class="label">Время</div><div class="value">${timeStr}</div></div>
                        <div><div class="label">Зона</div><div class="value">${g.zone}</div></div>
                        <div><div class="label">Места</div><div class="value pc-badge">№${pcsList}</div></div>
                    </div>
                </div>
            `;
        }).join('');
    } catch (e) {
        loader.innerText = "Ошибка загрузки.";
    }
}

async function confirmDelete(btn, ids) {
    if (btn.classList.contains('confirm-mode')) {
        btn.innerHTML = `<span class="material-symbols-outlined" style="animation: spin 1s infinite linear">sync</span>`;
        btn.disabled = true;
        try {
            await Promise.all(ids.map(id => api.delete('/bookings/delete_booking', { params: { booking_id: id } })));
            await loadBookings();
        } catch (e) {
            alert("Ошибка удаления");
            resetDeleteBtn(btn);
        }
    } else {
        btn.classList.add('confirm-mode');
        btn.innerHTML = `<span style="font-size: 10px; font-weight: bold;">ОК?</span>`;
        btn.style.width = "60px";
        btn.style.background = "#ff4d4d";
        btn.style.color = "#fff";
        setTimeout(() => resetDeleteBtn(btn), 3000);
    }
}

function resetDeleteBtn(btn) {
    if (btn && btn.classList.contains('confirm-mode')) {
        btn.classList.remove('confirm-mode');
        btn.innerHTML = `<span class="material-symbols-outlined">delete</span>`;
        btn.style.width = "36px";
        btn.style.background = "rgba(255,255,255,0.1)";
        btn.style.color = "#ff4d4d";
        btn.disabled = false;
    }
}

document.addEventListener('DOMContentLoaded', () => {
    syncProfile();
    loadBookings();
});
</script>
</body>
</html>
