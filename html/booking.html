<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мои брони — Underlie</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        :root {
            --bg-dark: #333333;
            --bg-light: #cccccc;
            --menu-bg: #2d2d2d;
            --card-bg: #1c1c1c;
            --text-main: #ffffff;
            --accent: #8b1a1a;
            --text-gray: #888888;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        body { background-color: var(--bg-light); color: var(--text-main); min-height: 100vh; }

        .main-header {
            background-color: var(--bg-dark);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .burger-menu {
            background: none; border: none; display: flex;
            flex-direction: column; gap: 5px; cursor: pointer; z-index: 1001;
        }

        .burger-bar { width: 25px; height: 2px; background-color: #fff; transition: 0.3s; }
        .burger-menu.open .burger-bar:nth-child(1) { transform: translateY(7px) rotate(45deg); }
        .burger-menu.open .burger-bar:nth-child(2) { opacity: 0; }
        .burger-menu.open .burger-bar:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

        .logo-box img { height: 30px; width: auto; }

        .side-drawer {
            position: fixed; top: 0; left: 0; width: 280px; height: 100vh;
            background-color: var(--menu-bg); z-index: 1000;
            transform: translateX(-100%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column; box-shadow: 10px 0 30px rgba(0,0,0,0.5);
        }
        .side-drawer.open { transform: translateX(0); }

        .user-block { padding: 60px 25px 30px; background-color: #262626; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .user-name { font-weight: 700; color: #fff; display: block; }
        .user-phone { font-size: 0.8rem; color: #888; margin-top: 5px; display: block; }

        .drawer-link {
            display: flex; align-items: center; padding: 18px 25px;
            color: #fff; text-decoration: none; font-size: 0.95rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .drawer-link span { margin-right: 15px; color: #888; }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); display: none; z-index: 999;
        }
        .overlay.active { display: block; }

        .container { padding: 20px; max-width: 450px; margin: 0 auto; }
        .page-title { color: #333; font-size: 22px; font-weight: 700; margin-bottom: 25px; text-align: center; }

        .booking-card {
            background: var(--card-bg); border-radius: 20px; padding: 20px;
            margin-bottom: 20px; border-left: 5px solid var(--accent);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            animation: slideUp 0.5s ease;
            position: relative; /* Для позиционирования кнопки удаления */
        }

        /* КНОПКА УДАЛЕНИЯ */
        .delete-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(255,255,255,0.05);
            border: none;
            color: #ff4d4d;
            cursor: pointer;
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
        }
        .delete-btn:hover { background: rgba(255,77,77,0.2); }
        .delete-btn span { font-size: 20px; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .club-name { font-size: 18px; font-weight: 700; color: var(--text-main); padding-right: 40px; }
        .club-address { font-size: 12px; color: var(--text-gray); margin-bottom: 15px; }

        .details-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .label { font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: 0.5px; }
        .value { font-size: 14px; font-weight: 600; color: #fff; margin-top: 2px; }

        .loader { text-align: center; color: #333; margin-top: 100px; font-weight: 700; }
        #empty-state { text-align: center; color: #666; margin-top: 100px; display: none; }
    </style>
</head>
<body>

<div class="overlay" id="overlay"></div>

<header class="main-header">
    <button class="burger-menu" id="burger">
        <span class="burger-bar"></span>
        <span class="burger-bar"></span>
        <span class="burger-bar"></span>
    </button>
    <div class="logo-box"><img src="../img/Frame 6.svg" alt="UNDERLIE"></div>
    <div style="width: 25px;"></div>
</header>

<nav class="side-drawer" id="sideDrawer">
    <div class="user-block">
        <span class="user-name" id="drawer_name">Загрузка...</span>
        <span class="user-phone" id="drawer_phone">...</span>
    </div>  
    <div class="drawer-nav">
        <a href="mainpage.html" class="drawer-link"><span class="material-symbols-outlined">home</span> Главная</a>
        <a href="map.html" class="drawer-link"><span class="material-symbols-outlined">search</span> Карта клубов</a>
        <a href="profile.html" class="drawer-link"><span class="material-symbols-outlined">person</span> Профиль</a>
        <a href="settings.html" class="drawer-link"><span class="material-symbols-outlined">settings</span> Настройки</a>
    </div>
</nav>

<div class="container">
    <h1 class="page-title">Мои бронирования</h1>
    <div id="loader" class="loader">Ищем ваши записи...</div>
    <div id="bookings-list"></div>
    <div id="empty-state">Пока здесь пусто, брат. Время забронировать ПК!</div>
</div>

<script>
    const API_URL = 'https://subopposite-nonheretical-brynn.ngrok-free.dev';

    const api = axios.create({
        baseURL: API_URL,
        headers: { "ngrok-skip-browser-warning": "69420" }
    });

    api.interceptors.request.use(config => {
        const token = localStorage.getItem('access_token');
        if (token) config.headers.Authorization = `Bearer ${token}`;
        return config;
    });

    const burgerBtn = document.getElementById('burger');
    const sideDrawer = document.getElementById('sideDrawer');
    const overlay = document.getElementById('overlay');

    function toggleMenu() {
        burgerBtn.classList.toggle('open');
        sideDrawer.classList.toggle('open');
        overlay.classList.toggle('active');
    }

    burgerBtn.addEventListener('click', toggleMenu);
    overlay.addEventListener('click', toggleMenu);

    // ФУНКЦИЯ УДАЛЕНИЯ БРОНИ
// ФУНКЦИЯ УДАЛЕНИЯ БРОНИ
async function deleteBooking(bookingId) {
    if (!confirm("Удалить это бронирование?")) return;

    try {
        // Добавляем конфиг для DELETE, чтобы точно прошел токен и параметры
        const res = await api.delete('/bookings/delete_booking', {
            params: { booking_id: bookingId }
        });
        
        if (res.status === 200 || res.status === 204) {
            alert("Бронь успешно отменена!");
            await loadData(); // Перезагружаем список
        }
    } catch (error) {
        console.error("Ошибка удаления:", error);
        // Выводим конкретную ошибку от сервера из твоего скрина
        const errorMsg = error.response?.data?.detail || "Not current user booking or booking not found";
        alert("Не удалось удалить: " + errorMsg);
    }
}

async function loadData() {
    const listElement = document.getElementById('bookings-list');
    const emptyState = document.getElementById('empty-state');
    const loader = document.getElementById('loader');

    try {
        if (loader) loader.style.display = 'block';
        
        // Подгружаем профиль
        try {
            const userRes = await api.get('/users/me');
            document.getElementById('drawer_name').innerText = userRes.data.full_name || "Игрок";
            document.getElementById('drawer_phone').innerText = userRes.data.phone_number || "";
        } catch(e) { console.error("Ошибка профиля"); }

        // Запрос броней
        const bookingsRes = await api.get('/bookings/get_bookings');
        const myBookings = bookingsRes.data;

        if (loader) loader.style.display = 'none';

        // Если пришел не массив (например, объект ошибки), делаем его пустым массивом
        const bookingsArray = Array.isArray(myBookings) ? myBookings : [];

        if (bookingsArray.length === 0) {
            emptyState.style.display = 'block';
            listElement.innerHTML = '';
            return;
        }

        emptyState.style.display = 'none';
        listElement.innerHTML = bookingsArray.map(b => {
            // Защита: если вдруг id нет в объекте
            if (!b.id) return '';

            const startDate = new Date(b.start_time);
            const endDate = new Date(b.end_time);
            
            const timeString = `${startDate.getHours().toString().padStart(2, '0')}:${startDate.getMinutes().toString().padStart(2, '0')} - ${endDate.getHours().toString().padStart(2, '0')}:${endDate.getMinutes().toString().padStart(2, '0')}`;
            const dateString = startDate.toLocaleDateString('ru-RU');

            return `
                <div class="booking-card" id="booking-${b.id}">
                    <button class="delete-btn" onclick="deleteBooking(${b.id})">
                        <span class="material-symbols-outlined">delete</span>
                    </button>
                    <div class="club-name">${b.club?.name || 'Клуб Prime'}</div>
                    <div class="club-address">${b.club?.address || 'Адрес'}</div>
                    <div class="details-grid">
                        <div><div class="label">Дата</div><div class="value">${dateString}</div></div>
                        <div><div class="label">Время</div><div class="value">${timeString}</div></div>
                        <div><div class="label">Зона</div><div class="value">${b.zone?.name || 'VIP'}</div></div>
                        <div><div class="label">ПК</div><div class="value">№${b.computer?.number || '30'}</div></div>
                    </div>
                </div>
            `;
        }).join('');

    } catch (error) {
        console.error("Ошибка загрузки:", error);
        if (loader) loader.innerText = "Ошибка загрузки данных.";
    }
}

    document.addEventListener('DOMContentLoaded', loadData);
</script>
</body>
</html>
