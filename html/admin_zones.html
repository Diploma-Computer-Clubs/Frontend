<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Underlie - Создание зон</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        :root {
            --bg-dark: #333333;
            --field-bg: #2d2d2d;
            --text-main: #ffffff;
            --accent-green: #00ff00;
            --bg-light: #cccccc;
            --danger: #ff453a;
            --card-bg: #2a2a2a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; overflow-x: hidden;
        }

        /* ── Бургер ── */
        .burger-menu { background: none; border: none; display: flex; flex-direction: column; gap: 5px; cursor: pointer; z-index: 1001; }
        .burger-bar { width: 25px; height: 2px; background-color: #fff; transition: 0.3s; }
        .burger-menu.open .burger-bar:nth-child(1) { transform: translateY(7px) rotate(45deg); }
        .burger-menu.open .burger-bar:nth-child(2) { opacity: 0; }
        .burger-menu.open .burger-bar:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

        /* ── Шторка ── */
        .side-drawer {
            position: fixed; top: 0; left: 0; width: 280px; height: 100vh;
            background-color: #2d2d2d; z-index: 1000; transform: translateX(-100%);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column; box-shadow: 10px 0 30px rgba(0,0,0,0.5);
        }
        .side-drawer.open { transform: translateX(0); }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; z-index: 999; }
        .overlay.active { display: block; }

        .user-block { padding: 60px 25px 30px; background-color: #262626; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .user-name { font-weight: 700; color: #fff; display: block; }
        .user-phone { font-size: 0.8rem; color: #888; margin-top: 5px; display: block; }
        .drawer-nav { display: flex; flex-direction: column; }
        .drawer-link { display: flex; align-items: center; padding: 18px 25px; color: #fff; text-decoration: none; font-size: 0.95rem; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .drawer-link span { margin-right: 15px; color: #888; }
        .drawer-link.logout { color: #ff6b6b; border-top: 1px solid rgba(255,255,255,0.07); }
        .drawer-link.logout span { color: #ff6b6b; }

        /* ── Контент ── */
        .phone-container { width: 100%; max-width: 430px; display: flex; flex-direction: column; padding: 20px; padding-bottom: 40px; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0 40px; width: 100%; }
        .header h1 { font-size: 20px; font-weight: 700; text-transform: uppercase; }

        .section-title {
            color: var(--bg-light); font-size: 12px; font-weight: 700;
            margin-bottom: 20px; text-transform: uppercase;
            letter-spacing: 1.5px; opacity: 0.7;
        }

        /* ── Карточка зоны ── */
        .zone-card {
            background: var(--card-bg);
            border: 1px solid #444;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            position: relative;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .zone-card-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 18px;
        }
        .zone-number {
            font-size: 13px; font-weight: 700;
            color: var(--accent-green); text-transform: uppercase; letter-spacing: 1px;
        }
        .remove-btn {
            background: none; border: none; cursor: pointer;
            color: var(--danger); display: flex; align-items: center;
            padding: 4px; border-radius: 8px; transition: background 0.2s;
        }
        .remove-btn:hover { background: rgba(255, 69, 58, 0.1); }

        /* ── Поля внутри карточки ── */
        .field-group { position: relative; margin-bottom: 20px; }
        .field-group:last-child { margin-bottom: 0; }
        .field-group label {
            position: absolute; top: -10px; left: 12px;
            background-color: var(--card-bg); padding: 0 6px;
            font-size: 11px; font-weight: 700; color: var(--bg-light); z-index: 1;
        }
        .field-group input {
            width: 100%; background: #222;
            border: 1px solid #555; border-radius: 10px;
            padding: 14px; color: white; font-size: 15px; outline: none;
            transition: border-color 0.3s; font-family: 'Montserrat', sans-serif;
        }
        .field-group input:focus { border-color: var(--accent-green); }

        /* Два поля в ряд (для X и Y) */
        .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .field-row .field-group { margin-bottom: 0; }

        /* ── Кнопка добавить зону ── */
        .add-zone-btn {
            width: 100%; background: transparent;
            border: 1.5px dashed #555; color: #888;
            padding: 16px; border-radius: 14px;
            font-size: 13px; font-weight: 700;
            cursor: pointer; transition: 0.3s;
            text-transform: uppercase; font-family: 'Montserrat', sans-serif;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            margin-bottom: 20px;
        }
        .add-zone-btn:hover { border-color: var(--accent-green); color: var(--accent-green); }

        /* ── Кнопка сохранить ── */
        .save-btn {
            width: 100%; background: transparent;
            border: 1px solid var(--accent-green); color: var(--accent-green);
            padding: 18px; border-radius: 12px;
            font-size: 14px; font-weight: 700;
            cursor: pointer; transition: 0.3s;
            text-transform: uppercase; font-family: 'Montserrat', sans-serif;
        }
        .save-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .save-btn:not(:disabled):active { background: var(--accent-green); color: black; }

        /* ── Сообщения ── */
        .error-box {
            display: none; background: rgba(255, 69, 58, 0.12);
            border: 1px solid var(--danger); color: var(--danger);
            border-radius: 12px; padding: 14px 16px;
            font-size: 13px; line-height: 1.6; white-space: pre-wrap; margin-top: 14px;
        }
        .error-box.visible { display: block; }
        .success-box {
            display: none; background: rgba(0, 255, 0, 0.08);
            border: 1px solid var(--accent-green); color: var(--accent-green);
            border-radius: 12px; padding: 14px 16px;
            font-size: 13px; line-height: 1.6; margin-top: 14px;
        }
        .success-box.visible { display: block; }

        /* ── Счётчик зон ── */
        .zones-count {
            font-size: 12px; color: #666; text-align: right;
            margin-bottom: 16px; font-weight: 700;
        }
    </style>
</head>
<body>

<div class="overlay" id="overlay"></div>

<nav class="side-drawer" id="sideDrawer">
    <div class="user-block">
        <span class="user-name" id="drawer_name">Загрузка...</span>
        <span class="user-phone" id="drawer_phone">...</span>
    </div>
    <div class="drawer-nav">
        <a href="mainpage.html" class="drawer-link"><span class="material-symbols-outlined">home</span> Главная</a>
        <a href="profile.html" class="drawer-link"><span class="material-symbols-outlined">account_circle</span> Профиль</a>
        <a href="map.html" class="drawer-link"><span class="material-symbols-outlined">search</span> Карта клубов</a>
        <a href="booking.html" class="drawer-link"><span class="material-symbols-outlined">diamond</span> Бронь</a>
        <a href="#" class="drawer-link logout" id="logoutLink"><span class="material-symbols-outlined">logout</span> Выйти</a>
    </div>
</nav>

<div class="phone-container">
    <div class="header">
        <button class="burger-menu" id="burger">
            <span class="burger-bar"></span>
            <span class="burger-bar"></span>
            <span class="burger-bar"></span>
        </button>
        <h1>Зоны клуба</h1>
        <div style="width: 25px;"></div>
    </div>

    <p class="section-title">Добавьте зоны</p>
    <div id="clubInfoBadge" style="display:none; font-size:12px; color:var(--accent-green); font-weight:700; margin-bottom:12px; padding: 8px 12px; background: rgba(0,255,0,0.07); border-radius:8px; border: 1px solid rgba(0,255,0,0.2);"></div>
    <div class="zones-count" id="zonesCount">0 зон</div>

    <div id="zonesContainer"></div>

    <button class="add-zone-btn" id="addZoneBtn">
        <span class="material-symbols-outlined">add</span>
        Добавить зону
    </button>

    <button class="save-btn" id="saveBtn">Сохранить зоны</button>
    <div class="error-box" id="errorBox"></div>
    <div class="success-box" id="successBox"></div>
</div>

<script>
    // ── AUTH GUARD ──
    (function() { if (!localStorage.getItem('access_token')) window.location.replace('check.html'); })();

    // ── club_id: URL → localStorage → null ──
    const urlParams = new URLSearchParams(window.location.search);
    const _rawId = urlParams.get('club_id') || localStorage.getItem('owner_club_id');
    let CLUB_ID = _rawId ? parseInt(_rawId, 10) : null;
    console.log("club_id resolved:", CLUB_ID);

    // ── API ──
    const _API = 'https://subopposite-nonheretical-brynn.ngrok-free.dev';
    const _api = axios.create({ baseURL: _API, headers: { "ngrok-skip-browser-warning": "69420" } });

    _api.interceptors.request.use(cfg => {
        const t = localStorage.getItem('access_token');
        if (t) cfg.headers.Authorization = `Bearer ${t}`;
        return cfg;
    });

    _api.interceptors.response.use(r => r, async err => {
        if (err.response?.status === 401 && !err.config._retry) {
            err.config._retry = true;
            const rt = localStorage.getItem('refresh_token');
            if (rt) {
                try {
                    const r = await axios.post(`${_API}/auth/refresh`, {}, {
                        headers: { "Authorization": `Bearer ${rt}`, "ngrok-skip-browser-warning": "69420" }
                    });
                    localStorage.setItem('access_token', r.data.access_token);
                    err.config.headers.Authorization = `Bearer ${r.data.access_token}`;
                    return _api(err.config);
                } catch { localStorage.clear(); window.location.href = 'check.html'; }
            } else { localStorage.clear(); window.location.href = 'check.html'; }
        }
        return Promise.reject(err);
    });

    // ── БУРГЕР ──
    const burger = document.getElementById('burger');
    const drawer = document.getElementById('sideDrawer');
    const overlay = document.getElementById('overlay');

    burger.addEventListener('click', () => {
        burger.classList.toggle('open');
        drawer.classList.toggle('open');
        overlay.classList.toggle('active');
    });
    overlay.addEventListener('click', () => {
        burger.classList.remove('open');
        drawer.classList.remove('open');
        overlay.classList.remove('active');
    });

    document.getElementById('logoutLink').addEventListener('click', e => {
        e.preventDefault();
        localStorage.clear();
        window.location.href = 'check.html';
    });

    // ── ДАННЫЕ ЮЗЕРА + АВТО CLUB_ID ──
    async function loadUserData() {
        try {
            const res = await _api.get('/users/me');
            document.getElementById('drawer_name').textContent = res.data.full_name || "Пользователь";
            document.getElementById('drawer_phone').textContent = res.data.phone_number || "";

            // Если club_id не пришёл — пробуем resolveClubId
            if (!CLUB_ID || isNaN(CLUB_ID)) {
                await resolveClubId();
            } else {
                // Показываем инфо о клубе
                try {
                    const clubRes = await _api.get(`/clubs/${CLUB_ID}`);
                    showClubInfo(clubRes.data.name);
                } catch { showClubInfo(`ID: ${CLUB_ID}`); }
            }
        } catch {}
    }

    async function resolveClubId() {
        // Нет эндпоинта для "мои клубы" — club_id должен быть в localStorage
        // (сохраняется автоматически при создании клуба через admin_create_club)
        showError("Не удалось определить клуб.\nПерейдите сюда через страницу создания клуба, или откройте:\nadmin_zones.html?club_id=ВАШ_ID");
        document.getElementById('saveBtn').disabled = true;
    }

    function showClubInfo(name) {
        const el = document.getElementById('clubInfoBadge');
        if (el) { el.textContent = `Клуб: ${name} (ID: ${CLUB_ID})`; el.style.display = 'block'; }
    }

    // ── ЗОНЫ ──
    let zoneCounter = 0;

    function updateCount() {
        const count = document.querySelectorAll('.zone-card').length;
        const word = count === 1 ? 'зона' : count >= 2 && count <= 4 ? 'зоны' : 'зон';
        document.getElementById('zonesCount').textContent = `${count} ${word}`;
    }

    function addZone() {
        zoneCounter++;
        const id = zoneCounter;
        const container = document.getElementById('zonesContainer');

        const card = document.createElement('div');
        card.className = 'zone-card';
        card.dataset.zoneId = id;

        card.innerHTML = `
            <div class="zone-card-header">
                <span class="zone-number">Зона #${id}</span>
                <button class="remove-btn" onclick="removeZone(${id})" title="Удалить">
                    <span class="material-symbols-outlined">delete</span>
                </button>
            </div>

            <div class="field-group">
                <label>Название</label>
                <input type="text" placeholder="Standard / VIP / Pro..." data-field="name">
            </div>

            <div class="field-group">
                <label>Стоимость (в час)</label>
                <input type="number" placeholder="0" min="0" data-field="cost">
            </div>

            <div class="field-group">
                <label>CPU</label>
                <input type="text" placeholder="Intel Core i7-12700K" data-field="cpu">
            </div>

            <div class="field-group">
                <label>GPU</label>
                <input type="text" placeholder="RTX 4070" data-field="gpu">
            </div>

            <div class="field-group">
                <label>RAM</label>
                <input type="text" placeholder="32GB DDR5" data-field="ram">
            </div>

            <div class="field-group">
                <label>SSD</label>
                <input type="text" placeholder="1TB NVMe" data-field="ssd">
            </div>

            <div class="field-group">
                <label>Монитор</label>
                <input type="text" placeholder='27" 165Hz IPS' data-field="monitor">
            </div>

            <div class="field-row">
                <div class="field-group">
                    <label>X (позиция)</label>
                    <input type="number" placeholder="0" data-field="x">
                </div>
                <div class="field-group">
                    <label>Y (позиция)</label>
                    <input type="number" placeholder="0" data-field="y">
                </div>
            </div>
        `;

        container.appendChild(card);
        updateCount();
        card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function removeZone(id) {
        const card = document.querySelector(`.zone-card[data-zone-id="${id}"]`);
        if (card) {
            card.style.transition = 'opacity 0.2s, transform 0.2s';
            card.style.opacity = '0';
            card.style.transform = 'translateY(-8px)';
            setTimeout(() => { card.remove(); updateCount(); }, 200);
        }
    }

    // ── UI HELPERS ──
    function showError(msg) {
        const box = document.getElementById('errorBox');
        box.textContent = msg;
        box.classList.toggle('visible', !!msg);
        document.getElementById('successBox').classList.remove('visible');
    }

    function showSuccess(msg) {
        const box = document.getElementById('successBox');
        box.textContent = msg;
        box.classList.add('visible');
        document.getElementById('errorBox').classList.remove('visible');
    }

    // ── СОХРАНЕНИЕ ──
    document.getElementById('saveBtn').addEventListener('click', async () => {
        const cards = document.querySelectorAll('.zone-card');
        const btn = document.getElementById('saveBtn');

        if (cards.length === 0) {
            showError("Добавьте хотя бы одну зону!");
            return;
        }

        const zones = [];
        let valid = true;

        cards.forEach((card, i) => {
            const get = (field) => card.querySelector(`[data-field="${field}"]`)?.value.trim() || "";
            const name = get('name');
            if (!name) { valid = false; showError(`Зона #${i + 1}: укажите название`); return; }

            zones.push({
                name,
                cost: Number(get('cost')) || 0,
                cpu: get('cpu') || "string",
                gpu: get('gpu') || "string",
                ram: get('ram') || "string",
                ssd: get('ssd') || "string",
                monitor: get('monitor') || "string",
                x: Number(get('x')) || 0,
                y: Number(get('y')) || 0,
                club_id: CLUB_ID
            });
        });

        if (!valid) return;

        console.log("Zones payload:", JSON.stringify(zones, null, 2));

        btn.disabled = true;
        btn.textContent = "Сохранение...";
        showError("");

        try {
            const res = await _api.post('/zones/', zones, { params: { club_id: CLUB_ID } });
            showSuccess(`✅ ${zones.length} зон(ы) успешно созданы!`);
            console.log("Ответ:", res.data);
            // Можно перейти на следующий шаг, например на список клубов
            // setTimeout(() => { window.location.href = 'mainpage.html'; }, 1500);
        } catch (err) {
            const status = err.response?.status;
            const detail = err.response?.data?.detail;

            let msg = "";
            if (status === 403) {
                msg = "❌ 403 Forbidden\n\nНедостаточно прав (нужна роль owner).";
            } else if (Array.isArray(detail)) {
                msg = `❌ ${status} Validation Error:\n` + detail.map(d => `• ${d.loc?.join('.')} — ${d.msg}`).join('\n');
            } else if (typeof detail === 'string') {
                msg = `❌ ${status}: ${detail}`;
            } else {
                msg = `❌ ${status || '?'} Error:\n${JSON.stringify(err.response?.data, null, 2)}`;
            }

            console.error("Ошибка:", err.response?.data);
            showError(msg);
        } finally {
            btn.disabled = false;
            btn.textContent = "Сохранить зоны";
        }
    });

    // ── ИНИТ ──
    document.getElementById('addZoneBtn').addEventListener('click', addZone);

    document.addEventListener('DOMContentLoaded', () => {
        loadUserData();
        addZone(); // Одна зона по умолчанию
    });
</script>
</body>
</html>
