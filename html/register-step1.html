<!DOCTYPE html>
<html lang="ru">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Регистрация</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: Arial, Helvetica, sans-serif;
}

html,body{
height:100%;
overflow:hidden;
color:white;
}

body{
display:flex;
justify-content:center;
align-items:center;
background:#000;
position:relative;
}

body::before{
content:"";
position:absolute;
top:-40px;
left:-40px;
right:-40px;
bottom:-40px;

background:url("/frontend/Frontend/img/bg.png") center/cover no-repeat;
filter: blur(8px) brightness(0.2);
z-index:-1;
}

.container{
width:340px;
display:flex;
flex-direction:column;
}

.logo{
display:flex;
justify-content:center;
margin-bottom:50px;
}

.logo img{
width:170px;
}

.field{
display:flex;
flex-direction:column;
margin-bottom:20px;
font-size:15px;
}

.field input{
margin-top:8px;
padding:14px;
border-radius:10px;
border:1px solid #aaa;
background:transparent;
color:white;
font-size:16px;
outline:none;
}

.field input::placeholder{
color:#ccc;
}

.error{
color:#ff6b6b;
font-size:14px;
margin-bottom:15px;
min-height:18px;
}

button{
width:100%;
padding:16px;
border-radius:14px;
border:none;
font-size:16px;
cursor:pointer;
background:#e9e9e9;
color:black;

box-shadow:
0 4px 8px rgba(0,0,0,0.25),
inset 0 1px 0 rgba(255,255,255,0.6);
}

button:active{
transform:scale(0.97);
}
.select-wrapper{
position:relative;
margin-top:8px;
}

.select-wrapper select{
width:100%;
padding:14px;
padding-right:45px;

border-radius:10px;
border:1px solid #aaa;

background:transparent;
color:white;
font-size:16px;
outline:none;
cursor:pointer;

/* убираем дефолтный стиль */
appearance:none;
-webkit-appearance:none;
-moz-appearance:none;

transition:0.2s;
}

/* стрелка */
.select-wrapper::after{
content:"";
position:absolute;
right:14px;
top:50%;
width:10px;
height:10px;
border-right:2px solid #ccc;
border-bottom:2px solid #ccc;
transform:translateY(-60%) rotate(45deg);
pointer-events:none;
}

/* hover */
.select-wrapper select:hover{
border-color:#fff;
}

/* focus */
.select-wrapper select:focus{
border-color:white;
box-shadow:0 0 0 2px rgba(255,255,255,0.15);
}

/* placeholder цвет */
.select-wrapper select:invalid{
color:#aaa;
}

/* dropdown список */
select option{
background:#111;
color:white;
}


</style>

</head>

<body>

<div class="container">

<div class="logo">
<img src="../img/Frame 6.svg" alt="logo">
</div>

<form id="registerForm">

<div class="field">
<label>Номер телефона</label>
<input id="phone" type="tel" placeholder="+7">
</div>

<div class="field">
<label>Имя</label>
<input id="name" type="text" placeholder="Ваше имя">
</div>

<div class="field">
  <label>Город</label>
  <div class="select-wrapper">
    <select id="city" required>
      <option value="" disabled selected hidden>Выберите город</option>
    </select>
  </div>
</div>

<div class="field">
<label>Пароль</label>
<input id="password" type="password">
</div>

<div class="field">
<label>Повторите пароль</label>
<input id="password2" type="password">
</div>

<div class="error" id="errorText"></div>

<button type="submit">Зарегистрироваться</button>

</form>

</div>

<script>

const form = document.getElementById("registerForm");

let cities = [];

async function loadCities(){
  try{
    const res = await fetch("https://subopposite-nonheretical-brynn.ngrok-free.dev/cities/get_all_cities", {
      headers:{
        "ngrok-skip-browser-warning": "69420"
      }
    });

    const data = await res.json();
    cities = data;

    const select = document.getElementById("city");

    // дефолтный option
    select.innerHTML = `<option value="">Выберите город</option>`;

    data.forEach(city => {
      const option = document.createElement("option");
      option.value = city.id;          // важное — id
      option.textContent = city.city;  // название
      select.appendChild(option);
    });

  }catch(err){
    console.log("Ошибка загрузки городов:", err);
  }
}

// вызываем при старте
loadCities();

form.addEventListener("submit", async function(e){

e.preventDefault();

const phone = document.getElementById("phone").value.trim();
const name = document.getElementById("name").value.trim();
const city_id = document.getElementById("city").value;
const password = document.getElementById("password").value;
const password2 = document.getElementById("password2").value;

const error = document.getElementById("errorText");

/* проверки */

const phoneRegex = /^\+7\d{10}$/;

if(!phoneRegex.test(phone)){
error.textContent = "Введите номер в формате +7XXXXXXXXXX";
return;
}

if(name.length < 2){
error.textContent = "Введите имя";
return;
}

if(city.length < 2){
error.textContent = "Введите город";
return;
}

if(password.length < 6){
error.textContent = "Пароль должен быть минимум 6 символов";
return;
}

if(password !== password2){
error.textContent = "Пароли не совпадают";
return;
}

/* маппинг городов */



if(!city_id){
  error.textContent = "Выберите город";
  return;
}

if(!city_id){
error.textContent = "Выберите корректный город";
return;
}

/* очистка ошибки */
error.textContent = "";

/* отправка */

try{

const response = await fetch("https://subopposite-nonheretical-brynn.ngrok-free.dev/users/registration",{

method:"POST",

headers:{
"Content-Type":"application/json",
"ngrok-skip-browser-warning": "69420"
},

body: JSON.stringify({
password: password,
phone_number: phone,
full_name: name,
role: "user",
city_id: city_id
})

});

const data = await response.json();

console.log("Ответ сервера:", data);

if(response.ok){
console.log("✅ Регистрация успешна");
alert("Успешная регистрация");
}else{
console.log("❌ Ошибка регистрации");
error.textContent = data.message || "Ошибка регистрации";
}

}catch(err){

console.log("🚫 Ошибка запроса:", err);
error.textContent = "Сервер недоступен";

}

});

</script>

</body>
</html>
