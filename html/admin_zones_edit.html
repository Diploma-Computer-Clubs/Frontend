<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Underlie - Редактирование зон</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        :root {
            --bg-dark: #333333;
            --field-bg: #2d2d2d;
            --card-bg: #2a2a2a;
            --text-main: #ffffff;
            --bg-light: #cccccc;
            --accent-green: #00ff00;
            --danger: #ff453a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }

        body {
            background-color: var(--bg-dark); color: var(--text-main);
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; overflow-x: hidden;
        }

        .burger-menu { background: none; border: none; display: flex; flex-direction: column; gap: 5px; cursor: pointer; z-index: 1001; }
        .burger-bar { width: 25px; height: 2px; background-color: #fff; transition: 0.3s; }
        .burger-menu.open .burger-bar:nth-child(1) { transform: translateY(7px) rotate(45deg); }
        .burger-menu.open .burger-bar:nth-child(2) { opacity: 0; }
        .burger-menu.open .burger-bar:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

        .side-drawer {
            position: fixed; top: 0; left: 0; width: 280px; height: 100vh;
            background-color: #2d2d2d; z-index: 1000; transform: translateX(-100%);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column; box-shadow: 10px 0 30px rgba(0,0,0,0.5);
        }
        .side-drawer.open { transform: translateX(0); }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; z-index: 999; }
        .overlay.active { display: block; }
        .user-block { padding: 60px 25px 30px; background-color: #262626; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .user-name { font-weight: 700; color: #fff; display: block; }
        .user-phone { font-size: 0.8rem; color: #888; margin-top: 5px; display: block; }
        .drawer-nav { display: flex; flex-direction: column; }
        .drawer-link { display: flex; align-items: center; padding: 18px 25px; color: #fff; text-decoration: none; font-size: 0.95rem; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .drawer-link span { margin-right: 15px; color: #888; }
        .drawer-link.logout { color: #ff6b6b; border-top: 1px solid rgba(255,255,255,0.07); }
        .drawer-link.logout span { color: #ff6b6b; }

        .phone-container { width: 100%; max-width: 430px; display: flex; flex-direction: column; padding: 20px; padding-bottom: 40px; }

        .header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0 30px; }
        .header h1 { font-size: 20px; font-weight: 700; text-transform: uppercase; }
        .back-btn { background: none; border: none; color: #fff; cursor: pointer; display: flex; align-items: center; }

        .section-title { color: var(--bg-light); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; opacity: 0.7; margin-bottom: 14px; }
        .zones-count { font-size: 12px; color: #555; font-weight: 700; text-align: right; margin-bottom: 14px; }

        /* ── Карточка зоны ── */
        .zone-card {
            background: var(--card-bg); border: 1px solid #444;
            border-radius: 16px; padding: 20px; margin-bottom: 14px;
        }
        .zone-card-header {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;
        }
        .zone-name-label { font-size: 14px; font-weight: 700; color: var(--accent-green); }
        .zone-id-label { font-size: 11px; color: #555; }

        .zone-actions { display: flex; gap: 8px; }
        .icon-btn-sm {
            background: none; border: 1px solid #444; border-radius: 8px;
            padding: 6px 8px; cursor: pointer; color: #888;
            display: flex; align-items: center; transition: 0.2s;
        }
        .icon-btn-sm:hover { border-color: #666; color: #fff; }
        .icon-btn-sm.danger { color: var(--danger); border-color: rgba(255,69,58,0.3); }
        .icon-btn-sm.danger:hover { background: rgba(255,69,58,0.1); border-color: var(--danger); }
        .icon-btn-sm .material-symbols-outlined { font-size: 18px; }

        /* ── Поля редактирования (скрытые по умолчанию) ── */
        .zone-info { display: flex; flex-direction: column; gap: 8px; }
        .zone-info-row { display: flex; justify-content: space-between; align-items: center; }
        .zone-info-key { font-size: 11px; color: #666; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
        .zone-info-val { font-size: 13px; color: #ccc; }

        .zone-edit-form { display: none; flex-direction: column; gap: 14px; }

        .field-group { position: relative; }
        .field-group label {
            position: absolute; top: -9px; left: 12px;
            background-color: var(--card-bg); padding: 0 6px;
            font-size: 10px; font-weight: 700; color: var(--bg-light); z-index: 1;
        }
        .field-group input {
            width: 100%; background: #1e1e1e; border: 1px solid #555;
            border-radius: 10px; padding: 13px; color: white;
            font-size: 14px; outline: none; font-family: 'Montserrat', sans-serif;
            transition: border-color 0.2s;
        }
        .field-group input:focus { border-color: var(--accent-green); }

        .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        .save-zone-btn {
            width: 100%; background: transparent;
            border: 1px solid var(--accent-green); color: var(--accent-green);
            padding: 14px; border-radius: 10px;
            font-size: 13px; font-weight: 700;
            cursor: pointer; font-family: 'Montserrat', sans-serif;
            transition: 0.2s; text-transform: uppercase; margin-top: 4px;
        }
        .save-zone-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .save-zone-btn:not(:disabled):active { background: var(--accent-green); color: black; }
        .cancel-zone-btn {
            width: 100%; background: transparent; border: 1px solid #444; color: #888;
            padding: 12px; border-radius: 10px; font-size: 13px; font-weight: 700;
            cursor: pointer; font-family: 'Montserrat', sans-serif; margin-top: 4px;
        }

        /* ── Модалка удаления ── */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.75); backdrop-filter: blur(10px);
            display: none; justify-content: center; align-items: center; z-index: 2000; padding: 20px;
        }
        .modal-overlay.active { display: flex; }
        .modal-card {
            background: #262626; width: 100%; max-width: 320px; padding: 30px;
            border-radius: 28px; text-align: center; border: 1px solid rgba(255,255,255,0.05);
            animation: modalIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes modalIn {
            from { opacity: 0; transform: translateY(20px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .modal-icon { font-size: 48px; color: var(--danger); margin-bottom: 15px; }
        .modal-card h2 { font-size: 18px; margin-bottom: 10px; }
        .modal-card p { font-size: 13px; color: #888; line-height: 1.5; margin-bottom: 24px; }
        .modal-actions { display: flex; flex-direction: column; gap: 10px; }
        .m-btn { padding: 15px; border-radius: 12px; border: none; font-weight: 700; font-size: 14px; cursor: pointer; font-family: 'Montserrat', sans-serif; }
        .m-confirm { background: var(--danger); color: white; }
        .m-cancel { background: transparent; color: #888; }

        .error-box {
            display: none; background: rgba(255,69,58,0.12);
            border: 1px solid var(--danger); color: var(--danger);
            border-radius: 12px; padding: 14px 16px;
            font-size: 13px; line-height: 1.6; white-space: pre-wrap; margin-top: 14px;
        }
        .error-box.visible { display: block; }

        .empty-state {
            text-align: center; padding: 40px 20px; color: #555;
        }
        .empty-state .material-symbols-outlined { font-size: 48px; margin-bottom: 12px; display: block; }
        .empty-state p { font-size: 14px; }

        .skeleton {
            background: linear-gradient(90deg, #2a2a2a 25%, #333 50%, #2a2a2a 75%);
            background-size: 200% 100%; animation: shimmer 1.5s infinite;
            border-radius: 8px;
        }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body>

<div class="modal-overlay" id="deleteModal">
    <div class="modal-card">
        <span class="material-symbols-outlined modal-icon">delete_forever</span>
        <h2>Удалить зону?</h2>
        <p id="deleteModalText">Зона будет удалена навсегда.</p>
        <div class="modal-actions">
            <button class="m-btn m-confirm" id="confirmDeleteBtn">Да, удалить</button>
            <button class="m-btn m-cancel" id="cancelDeleteBtn">Отмена</button>
        </div>
    </div>
</div>

<div class="overlay" id="overlay"></div>

<nav class="side-drawer" id="sideDrawer">
    <div class="user-block">
        <span class="user-name" id="drawer_name">Загрузка...</span>
        <span class="user-phone" id="drawer_phone">...</span>
    </div>
    <div class="drawer-nav">
        <a href="mainpage.html" class="drawer-link"><span class="material-symbols-outlined">home</span> Главная</a>
        <a href="admin_dashboard.html" class="drawer-link"><span class="material-symbols-outlined">dashboard</span> Мой клуб</a>
        <a href="map.html" class="drawer-link"><span class="material-symbols-outlined">search</span> Карта клубов</a>
        <a href="booking.html" class="drawer-link"><span class="material-symbols-outlined">diamond</span> Бронь</a>
        <a href="#" class="drawer-link logout" id="logoutLink"><span class="material-symbols-outlined">logout</span> Выйти</a>
    </div>
</nav>

<div class="phone-container">
    <div class="header">
        <button class="burger-menu" id="burger">
            <span class="burger-bar"></span>
            <span class="burger-bar"></span>
            <span class="burger-bar"></span>
        </button>
        <h1>Зоны клуба</h1>
        <button class="back-btn" onclick="history.back()">
            <span class="material-symbols-outlined">arrow_back</span>
        </button>
    </div>

    <p class="section-title">Все зоны</p>
    <div class="zones-count" id="zonesCount"></div>
    <div id="zonesContainer">
        <!-- скелетоны -->
        <div style="background:#2a2a2a;border-radius:16px;padding:20px;margin-bottom:14px;">
            <div class="skeleton" style="height:18px;width:40%;margin-bottom:12px;"></div>
            <div class="skeleton" style="height:13px;width:70%;margin-bottom:8px;"></div>
            <div class="skeleton" style="height:13px;width:55%;"></div>
        </div>
        <div style="background:#2a2a2a;border-radius:16px;padding:20px;margin-bottom:14px;">
            <div class="skeleton" style="height:18px;width:35%;margin-bottom:12px;"></div>
            <div class="skeleton" style="height:13px;width:65%;margin-bottom:8px;"></div>
            <div class="skeleton" style="height:13px;width:50%;"></div>
        </div>
    </div>
    <div class="error-box" id="errorBox"></div>
</div>

<script>
    (function() { if (!localStorage.getItem('access_token')) window.location.replace('check.html'); })();

    const urlParams = new URLSearchParams(window.location.search);
    const rawId = urlParams.get('club_id') || localStorage.getItem('owner_club_id');
    const CLUB_ID = rawId ? parseInt(rawId, 10) : null;

    const _API = 'https://subopposite-nonheretical-brynn.ngrok-free.dev';
    const _api = axios.create({ baseURL: _API, headers: { "ngrok-skip-browser-warning": "69420" } });

    _api.interceptors.request.use(cfg => {
        const t = localStorage.getItem('access_token');
        if (t) cfg.headers.Authorization = `Bearer ${t}`;
        return cfg;
    });
    _api.interceptors.response.use(r => r, async err => {
        if (err.response?.status === 401 && !err.config._retry) {
            err.config._retry = true;
            const rt = localStorage.getItem('refresh_token');
            if (rt) {
                try {
                    const r = await axios.post(`${_API}/auth/refresh`, {}, { headers: { "Authorization": `Bearer ${rt}`, "ngrok-skip-browser-warning": "69420" } });
                    localStorage.setItem('access_token', r.data.access_token);
                    err.config.headers.Authorization = `Bearer ${r.data.access_token}`;
                    return _api(err.config);
                } catch { localStorage.clear(); window.location.href = 'check.html'; }
            } else { localStorage.clear(); window.location.href = 'check.html'; }
        }
        return Promise.reject(err);
    });

    // ── Бургер ──
    const burger = document.getElementById('burger');
    const drawer = document.getElementById('sideDrawer');
    const overlay = document.getElementById('overlay');
    burger.addEventListener('click', () => { burger.classList.toggle('open'); drawer.classList.toggle('open'); overlay.classList.toggle('active'); });
    overlay.addEventListener('click', () => { burger.classList.remove('open'); drawer.classList.remove('open'); overlay.classList.remove('active'); });
    document.getElementById('logoutLink').addEventListener('click', e => { e.preventDefault(); localStorage.clear(); window.location.href = 'check.html'; });

    function showError(msg) {
        const box = document.getElementById('errorBox');
        box.textContent = msg;
        box.classList.toggle('visible', !!msg);
    }

    // ── Рендер зон ──
    function renderZones(zones) {
        const container = document.getElementById('zonesContainer');
        const count = zones.length;
        const word = count === 1 ? 'зона' : count >= 2 && count <= 4 ? 'зоны' : 'зон';
        document.getElementById('zonesCount').textContent = `${count} ${word}`;

        if (count === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <span class="material-symbols-outlined">computer</span>
                    <p>Зон пока нет.<br>Добавьте первую зону.</p>
                </div>`;
            return;
        }

        container.innerHTML = '';
        zones.forEach(zone => {
            const card = document.createElement('div');
            card.className = 'zone-card';
            card.dataset.zoneId = zone.id;
            card.innerHTML = `
                <div class="zone-card-header">
                    <div>
                        <div class="zone-name-label">${zone.name}</div>
                        <div class="zone-id-label">ID: ${zone.id} · ${zone.cost} ₸/час</div>
                    </div>
                    <div class="zone-actions">
                        <button class="icon-btn-sm" onclick="toggleEdit(${zone.id})" title="Редактировать">
                            <span class="material-symbols-outlined">edit</span>
                        </button>
                        <button class="icon-btn-sm danger" onclick="openDeleteModal(${zone.id}, '${zone.name}')" title="Удалить">
                            <span class="material-symbols-outlined">delete</span>
                        </button>
                    </div>
                </div>

                <!-- Просмотр -->
                <div class="zone-info" id="info_${zone.id}">
                    <div class="zone-info-row"><span class="zone-info-key">CPU</span><span class="zone-info-val">${zone.cpu}</span></div>
                    <div class="zone-info-row"><span class="zone-info-key">GPU</span><span class="zone-info-val">${zone.gpu}</span></div>
                    <div class="zone-info-row"><span class="zone-info-key">RAM</span><span class="zone-info-val">${zone.ram}</span></div>
                    <div class="zone-info-row"><span class="zone-info-key">SSD</span><span class="zone-info-val">${zone.ssd}</span></div>
                    <div class="zone-info-row"><span class="zone-info-key">Монитор</span><span class="zone-info-val">${zone.monitor}</span></div>
                    <div class="zone-info-row"><span class="zone-info-key">Позиция</span><span class="zone-info-val">X: ${zone.x}, Y: ${zone.y}</span></div>
                </div>

                <!-- Редактирование -->
                <div class="zone-edit-form" id="edit_${zone.id}">
                    <div class="field-group"><label>Название</label><input type="text" data-field="name" value="${zone.name}"></div>
                    <div class="field-group"><label>Стоимость (₸/час)</label><input type="number" data-field="cost" value="${zone.cost}"></div>
                    <div class="field-group"><label>CPU</label><input type="text" data-field="cpu" value="${zone.cpu}"></div>
                    <div class="field-group"><label>GPU</label><input type="text" data-field="gpu" value="${zone.gpu}"></div>
                    <div class="field-group"><label>RAM</label><input type="text" data-field="ram" value="${zone.ram}"></div>
                    <div class="field-group"><label>SSD</label><input type="text" data-field="ssd" value="${zone.ssd}"></div>
                    <div class="field-group"><label>Монитор</label><input type="text" data-field="monitor" value="${zone.monitor}"></div>
                    <div class="field-row">
                        <div class="field-group"><label>X</label><input type="number" data-field="x" value="${zone.x}"></div>
                        <div class="field-group"><label>Y</label><input type="number" data-field="y" value="${zone.y}"></div>
                    </div>
                    <button class="save-zone-btn" id="saveBtn_${zone.id}" onclick="saveZone(${zone.id})">Сохранить</button>
                    <button class="cancel-zone-btn" onclick="toggleEdit(${zone.id})">Отмена</button>
                </div>
            `;
            container.appendChild(card);
        });
    }

    function toggleEdit(zoneId) {
        const info = document.getElementById(`info_${zoneId}`);
        const edit = document.getElementById(`edit_${zoneId}`);
        const isEditing = edit.style.display === 'flex';
        info.style.display = isEditing ? 'flex' : 'none';
        edit.style.display = isEditing ? 'none' : 'flex';
    }

    async function saveZone(zoneId) {
        const card = document.querySelector(`.zone-card[data-zone-id="${zoneId}"]`);
        const btn = document.getElementById(`saveBtn_${zoneId}`);
        const get = (field) => card.querySelector(`[data-field="${field}"]`)?.value.trim();

        const payload = [{
            id: zoneId,
            name: get('name'),
            cost: Number(get('cost')) || 0,
            cpu: get('cpu') || "string",
            gpu: get('gpu') || "string",
            ram: get('ram') || "string",
            ssd: get('ssd') || "string",
            monitor: get('monitor') || "string",
            x: Number(get('x')) || 0,
            y: Number(get('y')) || 0
        }];

        btn.disabled = true;
        btn.textContent = "Сохранение...";

        try {
            await _api.patch(`/zones/${zoneId}`, payload, { params: { club_id: CLUB_ID } });
            // Обновляем данные в просмотре
            card.querySelector('.zone-name-label').textContent = payload[0].name;
            card.querySelector('.zone-id-label').textContent = `ID: ${zoneId} · ${payload[0].cost} ₸/час`;
            card.querySelector('#info_' + zoneId).querySelectorAll('.zone-info-val')[0].textContent = payload[0].cpu;
            card.querySelector('#info_' + zoneId).querySelectorAll('.zone-info-val')[1].textContent = payload[0].gpu;
            card.querySelector('#info_' + zoneId).querySelectorAll('.zone-info-val')[2].textContent = payload[0].ram;
            card.querySelector('#info_' + zoneId).querySelectorAll('.zone-info-val')[3].textContent = payload[0].ssd;
            card.querySelector('#info_' + zoneId).querySelectorAll('.zone-info-val')[4].textContent = payload[0].monitor;
            card.querySelector('#info_' + zoneId).querySelectorAll('.zone-info-val')[5].textContent = `X: ${payload[0].x}, Y: ${payload[0].y}`;
            toggleEdit(zoneId);
            showError("");
        } catch (err) {
            const detail = err.response?.data?.detail;
            showError(`❌ Ошибка ${err.response?.status}: ${typeof detail === 'string' ? detail : JSON.stringify(detail)}`);
        } finally {
            btn.disabled = false;
            btn.textContent = "Сохранить";
        }
    }

    // ── Удаление ──
    let pendingDeleteId = null;

    function openDeleteModal(zoneId, zoneName) {
        pendingDeleteId = zoneId;
        document.getElementById('deleteModalText').textContent = `Зона "${zoneName}" будет удалена навсегда.`;
        document.getElementById('deleteModal').classList.add('active');
    }

    document.getElementById('cancelDeleteBtn').addEventListener('click', () => {
        document.getElementById('deleteModal').classList.remove('active');
        pendingDeleteId = null;
    });

    document.getElementById('confirmDeleteBtn').addEventListener('click', async () => {
        if (!pendingDeleteId) return;
        const btn = document.getElementById('confirmDeleteBtn');
        btn.disabled = true;
        btn.textContent = "Удаление...";

        try {
            await _api.delete(`/zones/${pendingDeleteId}`, { params: { club_id: CLUB_ID } });
            document.getElementById('deleteModal').classList.remove('active');

            // Анимация удаления карточки
            const card = document.querySelector(`.zone-card[data-zone-id="${pendingDeleteId}"]`);
            if (card) {
                card.style.transition = 'opacity 0.2s, transform 0.2s';
                card.style.opacity = '0';
                card.style.transform = 'translateX(20px)';
                setTimeout(() => {
                    card.remove();
                    const remaining = document.querySelectorAll('.zone-card').length;
                    const word = remaining === 1 ? 'зона' : remaining >= 2 && remaining <= 4 ? 'зоны' : 'зон';
                    document.getElementById('zonesCount').textContent = `${remaining} ${word}`;
                    if (remaining === 0) {
                        document.getElementById('zonesContainer').innerHTML = `
                            <div class="empty-state">
                                <span class="material-symbols-outlined">computer</span>
                                <p>Зон пока нет.</p>
                            </div>`;
                    }
                }, 200);
            }
            pendingDeleteId = null;
        } catch (err) {
            showError(`❌ Ошибка удаления: ${err.response?.status}`);
        } finally {
            btn.disabled = false;
            btn.textContent = "Да, удалить";
            document.getElementById('deleteModal').classList.remove('active');
        }
    });

    // ── Инит ──
    document.addEventListener('DOMContentLoaded', async () => {
        if (!CLUB_ID || isNaN(CLUB_ID)) {
            document.getElementById('zonesContainer').innerHTML = '';
            showError("Клуб не найден. Вернитесь на панель управления.");
            return;
        }

        try {
            const userRes = await _api.get('/users/me');
            document.getElementById('drawer_name').textContent = userRes.data.full_name || "Пользователь";
            document.getElementById('drawer_phone').textContent = userRes.data.phone_number || "";

            const zonesRes = await _api.get('/zones/', { params: { club_id: CLUB_ID } });
            renderZones(zonesRes.data);
        } catch (err) {
            document.getElementById('zonesContainer').innerHTML = '';
            showError(`Ошибка загрузки зон: ${err.response?.status || err.message}`);
        }
    });
</script>
</body>
</html>
