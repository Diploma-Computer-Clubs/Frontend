<!DOCTYPE html>
    <html lang="ru">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
        <style>
            /* БАЗОВЫЕ СТИЛИ (Оставляем как было) */
            * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
            body { background: #000; color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
            
            /* НОВАЯ КРАСИВАЯ ШАПКА (Стиль Details) */
            .slide-header { position: sticky; top: 0; z-index: 10; background: rgba(17,17,17,0.95); backdrop-filter: blur(10px); display: flex; flex-direction: column; align-items: center; padding: 20px 16px; border-bottom: 1px solid rgba(255,255,255,0.07); text-align: center; }
            
            /* Кнопка назад влево */
            .back-btn { position: absolute; left: 16px; top: 20px; background: rgba(255,255,255,0.08); border: none; border-radius: 10px; width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #fff; text-decoration: none; }
            .back-btn:active { background: rgba(255,255,255,0.18); }

            /* Логотип по центру */
            .club-logo-frame { width: 70px; height: 70px; border-radius: 15px; background: #222; border: 2px solid rgba(255,255,255,0.1); overflow: hidden; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; }
            .club-logo-img { width: 100%; height: 100%; object-fit: cover; display: none; } /* Скрыто пока нет фото */
            .club-logo-placeholder { font-size: 30px; color: rgba(255,255,255,0.2); font-weight: 700; } /* Плейсхолдер */

            /* Название и адрес */
            .club-name { font-size: 18px; font-weight: 700; color: #fff; text-transform: uppercase; letter-spacing: 1px; }
            .club-address { font-size: 11px; color: rgba(255,255,255,0.5); display: flex; align-items: center; justify-content: center; gap: 4px; margin-top: 4px; }

            /* КАРТА (Оставляем как было) */
            .map-wrapper { flex: 1; display: flex; align-items: center; justify-content: center; padding: 10px; position: relative; overflow: auto; background: #0a0a0a; }
            .map-container { position: relative; width: 340px; height: 460px; background: #000; border: 1px solid #222; border-radius: 20px; }
            .label { position: absolute; font-size: 10px; font-weight: 700; color: #333; text-transform: uppercase; }
            .pc { position: absolute; width: 32px; height: 32px; background: #111; border: 1px solid #333; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; cursor: pointer; transition: 0.2s; color: #666; }
            .pc.selected { background: #8b1a1a; border-color: #ff4d4d; color: #fff; box-shadow: 0 0 12px rgba(139,26,26,0.6); }
            .pc.vip { border-color: #8b1a1a; color: #8b1a1a; }
            .pc.vip.selected { background: #ff4d4d; color: #000; }

            /* ФУТЕР (Оставляем как было) */
            .footer { background: #000; padding: 20px 16px 30px; border-top: 1px solid #1a1a1a; z-index: 20; }
            .date-selector { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 15px; margin-bottom: 15px; scrollbar-width: none; }
            .date-item { flex: 0 0 50px; height: 55px; background: rgba(255,255,255,0.03); border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; }
            .date-item.active { background: #8b1a1a; color: #fff; }
            .date-item span { font-size: 9px; color: #666; text-transform: uppercase; }
            .date-item.active span { color: #eee; }
            .date-item b { font-size: 15px; font-weight: 700; }
            .info-box { margin-bottom: 20px; }
            .info-label { font-size: 12px; color: #888; margin-bottom: 2px; }
            .info-value { font-size: 14px; font-weight: 700; line-height: 1.4; }
            .info-value span { color: #ff4d4d; }
            .btn-confirm { width: 100%; padding: 18px; background: #333; color: #666; border: none; border-radius: 14px; font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.3s; text-transform: uppercase; pointer-events: none; }
            .btn-confirm.active { background: #8b1a1a; color: #fff; pointer-events: auto; }

            /* Доп. стили для новых элементов */
            .static-obj { position: absolute; border: 1px solid rgba(255,255,255,0.1); color: #444; font-size: 9px; font-weight: 700; text-transform: uppercase; display: flex; align-items: center; justify-content: center; text-align: center; }
            .reception { width: 100px; height: 40px; border-style: dashed; flex-direction: column; gap: 2px; }
            .reception span { font-size: 16px; }
            .wc { width: 40px; height: 35px; background: #0a0a0a; }
            .entrance-label { position: absolute; color: #222; font-size: 12px; font-weight: 800; letter-spacing: 4px; }
            
            /* Обновленный стиль лейблов зон */
            .label { position: absolute; font-size: 11px; font-weight: 800; color: #222; text-transform: uppercase; letter-spacing: 1px; pointer-events: none; }

            /* СТИЛИ УВЕДОМЛЕНИЙ */
            .toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; }
            .toast { background: #1a1a1a; color: #fff; padding: 14px 18px; border-radius: 12px; margin-bottom: 10px; border-left: 4px solid #8b1a1a; box-shadow: 0 10px 25px rgba(0,0,0,0.5); display: flex; align-items: center; gap: 10px; font-size: 13px; font-weight: 700; min-width: 250px; animation: slideIn 0.3s ease-out forwards; }
            .toast.success { border-left-color: #4CAF50; }
            @keyframes slideIn { from { transform: translateX(120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
            @keyframes slideOut { to { transform: translateX(120%); opacity: 0; } }
        </style>
    </head>
    <body>

        <div class="slide-header">
            <a href="javascript:history.back()" class="back-btn"><span class="material-symbols-outlined">arrow_back</span></a>
            
            <div class="club-logo-frame">
                <img id="clubLogoImg" class="club-logo-img" src="" alt="">
                <div id="clubLogoPlaceholder" class="club-logo-placeholder">RG</div>
            </div>
            
            <span class="club-name" id="clubNameHeader">Загрузка...</span>
            <span class="club-address" id="clubAddrHeader"><span class="material-symbols-outlined" style="font-size:12px">location_on</span> —</span>
        </div>

    <div class="map-wrapper">
        <div class="map-container" id="clubMap">
            <div class="static-obj reception" style="top: 80px; left: 140px;">
                <span class="material-symbols-outlined">person</span>
                стойка<br>администратора
            </div>
            
            <div class="static-obj wc" style="top: 250px; right: 10px;">WC</div>
            <div class="static-obj wc" style="top: 190px; right: 10px;">WC</div>
            

            <div class="label" style="top: 130px; left: 145px;">main</div>
            <div class="label" style="top: 290px; left: 140px;">vip zone</div>

            <div id="pcsLayer"></div>
        </div>
    </div>

        <div class="footer">
            <div class="date-selector" id="dateSelector"></div>
            <div class="info-box">
                <div class="info-label">Вы выбрали место:</div>
                <div class="info-value" id="seatLabel"><span>не выбраны</span></div>
                <div class="info-label" style="margin-top:10px">Время:</div>
                <div class="info-value" id="timeLabel">--:--</div>
            </div>
            <button class="btn-confirm" id="confirmBtn" onclick="handleBooking()">Подтвердить бронирование</button>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
        <script>
            const API_URL = 'https://subopposite-nonheretical-brynn.ngrok-free.dev';
            const params = new URLSearchParams(window.location.search);
            const clubId = params.get('club_id') || 27; // Динамика по URL
            
            const startTime = localStorage.getItem('booking_start_time') || "17:00";
            const endTime = localStorage.getItem('booking_end_time') || "18:00";
            const token = localStorage.getItem('access_token');

            let selected = [];
            let selectedDateStr = "";

            // Функция для показа уведомлений
            function showToast(message, type = 'error') {
                let container = document.querySelector('.toast-container');
                if (!container) {
                    container = document.createElement('div');
                    container.className = 'toast-container';
                    document.body.appendChild(container);
                }
                const toast = document.createElement('div');
                toast.className = `toast ${type}`;
                const icon = type === 'success' ? 'check_circle' : 'info';
                toast.innerHTML = `<span class="material-symbols-outlined">${icon}</span> ${message}`;
                container.appendChild(toast);
                setTimeout(() => {
                    toast.style.animation = 'slideOut 0.4s ease-in forwards';
                    setTimeout(() => toast.remove(), 400);
                }, 3000);
            }

            const pcsData = [
                {n: 1, id: 5, zid: 7, x: 50, y: 150, isVip: false},
                {n: 2, id: 6, zid: 7, x: 100, y: 150, isVip: false},
                {n: 3, id: 11, zid: 7, x: 150, y: 150, isVip: false},
                {n: 4, id: 12, zid: 7, x: 200, y: 150, isVip: false},
                {n: 5, id: 13, zid: 7, x: 250, y: 150, isVip: false},
                {n: 30, id: 4, zid: 9, x: 50, y: 320, isVip: true},
                {n: 31, id: 7, zid: 9, x: 100, y: 320, isVip: true},
                {n: 32, id: 8, zid: 9, x: 150, y: 320, isVip: true},
                {n: 33, id: 9, zid: 9, x: 200, y: 320, isVip: true},
                {n: 34, id: 10, zid: 9, x: 250, y: 320, isVip: true}
            ];

            async function fetchClubInfo() {
                try {
                    const cached = localStorage.getItem('club_cache_' + clubId);
                    if (cached) renderHeader(JSON.parse(cached));
                    const r = await axios.get(`${API_URL}/clubs/get_club_info?club_id=${clubId}`, {
                        headers: { "ngrok-skip-browser-warning": "69420" }
                    });
                    renderHeader(r.data);
                    localStorage.setItem('club_cache_' + clubId, JSON.stringify(r.data));
                } catch (e) {
                    document.getElementById('clubNameHeader').innerText = "Клуб Prime";
                }
            }

            function renderHeader(club) {
                document.getElementById('clubNameHeader').innerText = club.name;
                document.getElementById('clubAddrHeader').innerHTML = `<span class="material-symbols-outlined" style="font-size:12px">location_on</span> ${club.address}`;
                const logoImg = document.getElementById('clubLogoImg');
                const logoPlaceholder = document.getElementById('clubLogoPlaceholder');
                if (club.image_url && club.image_url !== 'string') {
                    logoImg.src = API_URL + club.image_url;
                    logoImg.style.display = 'block';
                    logoPlaceholder.style.display = 'none';
                } else {
                    logoPlaceholder.innerText = club.name.substring(0, 2).toUpperCase();
                }
            }

            function renderMap() {
                const layer = document.getElementById('pcsLayer');
                layer.innerHTML = ''; 
                pcsData.forEach(pc => {
                    const el = document.createElement('div');
                    el.className = `pc ${pc.isVip ? 'vip' : ''}`;
                    el.innerText = pc.n;
                    el.style.top = pc.y + 'px';
                    el.style.left = pc.x + 'px';
                    el.onclick = () => {
                        const idx = selected.findIndex(s => s.id === pc.id);
                        if (idx > -1) {
                            selected.splice(idx, 1);
                            el.classList.remove('selected');
                        } else {
                            if (selected.length >= 5) {
                                showToast("Максимум можно выбрать 5 компьютеров");
                                return;
                            }
                            selected.push(pc);
                            el.classList.add('selected');
                        }
                        updateUI();
                    };
                    layer.appendChild(el);
                });
            }

            function updateUI() {
                const btn = document.getElementById('confirmBtn');
                const label = document.getElementById('seatLabel');
                if (selected.length > 0) {
                    const grouped = selected.reduce((acc, curr) => {
                        const zone = curr.isVip ? "Vip зона" : "Общий зал";
                        acc[zone] = acc[zone] || [];
                        acc[zone].push(`№${curr.n}`);
                        return acc;
                    }, {});
                    label.innerHTML = Object.entries(grouped).map(([z, nums]) => `${z} <b>${nums.join(', ')}</b>`).join('<br>');
                    btn.classList.add('active');
                } else {
                    label.innerHTML = '<span>не выбраны</span>';
                    btn.classList.remove('active');
                }
            }

            async function handleBooking() {
                const btn = document.getElementById('confirmBtn');
                btn.innerText = "БРОНИРУЕМ...";
                btn.classList.remove('active');
                try {
                    const payload = JSON.parse(atob(token.split('.')[1]));
                    const userId = payload.sub || payload.user_id;
                    const data = selected.map(s => ({
                        "start_time": `${selectedDateStr}T${startTime}:00`,
                        "end_time": `${selectedDateStr}T${endTime}:00`,
                        "total_price": 0,
                        "user_id": parseInt(userId),
                        "computer_id": s.id, 
                        "zone_id": s.zid,    
                        "club_id": parseInt(clubId)
                    }));
                    await axios.post(`${API_URL}/bookings/create_booking`, data, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    showToast("Успешно забронировано!", "success");
                    setTimeout(() => { window.location.href = 'booking.html'; }, 1500);
                } catch (e) {
                    showToast(e.response?.data?.detail || "Ошибка бронирования");
                    btn.innerText = "ПОДТВЕРДИТЬ БРОНИРОВАНИЕ";
                    btn.classList.add('active');
                }
            }

function initCalendar() {
    const list = document.getElementById('dateSelector');
    const daysShort = ['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];
    
    for (let i = 0; i < 7; i++) {
        const d = new Date();
        d.setDate(d.getDate() + i);
        
        // КОРРЕКТНОЕ ЛОКАЛЬНОЕ ФОРМИРОВАНИЕ ДАТЫ (ГГГГ-ММ-ДД)
        const year = d.getFullYear();
        const month = String(d.getMonth() + 1).padStart(2, '0');
        const day = String(d.getDate()).padStart(2, '0');
        const iso = `${year}-${month}-${day}`; 

        const item = document.createElement('div');
        item.className = `date-item ${i === 0 ? 'active' : ''}`;
        
        if (i === 0) selectedDateStr = iso;

        item.innerHTML = `<span>${daysShort[d.getDay()]}</span><b>${d.getDate()}</b>`;
        
        item.onclick = () => {
            const allItems = document.querySelectorAll('.date-item');
            allItems.forEach(el => el.classList.remove('active'));
            item.classList.add('active');
            selectedDateStr = iso;
            console.log("Выбрана дата:", selectedDateStr); // Для проверки
        };
        list.appendChild(item);
    }
}

            document.addEventListener('DOMContentLoaded', () => {
                fetchClubInfo();
                renderMap();
                initCalendar();
                document.getElementById('timeLabel').innerText = `${startTime} - ${endTime}`;
            });
        </script>
    </body>
    </html>
