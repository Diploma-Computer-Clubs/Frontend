<!DOCTYPE html>
    <html lang="ru">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
        <style>
            * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
            body { background: #000; color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
            
            .slide-header { position: sticky; top: 0; z-index: 10; background: rgba(17,17,17,0.95); backdrop-filter: blur(10px); display: flex; flex-direction: column; align-items: center; padding: 20px 16px; border-bottom: 1px solid rgba(255,255,255,0.07); text-align: center; }
           
            .back-btn { position: absolute; left: 16px; top: 20px; background: rgba(255,255,255,0.08); border: none; border-radius: 10px; width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #fff; text-decoration: none; }
            .back-btn:active { background: rgba(255,255,255,0.18); }

            .club-logo-frame { width: 70px; height: 70px; border-radius: 15px; background: #222; border: 2px solid rgba(255,255,255,0.1); overflow: hidden; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; }
            .club-logo-img { width: 100%; height: 100%; object-fit: cover; display: none; } /* Скрыто пока нет фото */
            .club-logo-placeholder { font-size: 30px; color: rgba(255,255,255,0.2); font-weight: 700; } /* Плейсхолдер */

            .club-name { font-size: 18px; font-weight: 700; color: #fff; text-transform: uppercase; letter-spacing: 1px; }
            .club-address { font-size: 11px; color: rgba(255,255,255,0.5); display: flex; align-items: center; justify-content: center; gap: 4px; margin-top: 4px; }

            .map-wrapper { flex: 1; display: flex; align-items: center; justify-content: center; padding: 10px; position: relative; overflow: auto; background: #0a0a0a; }
            .map-container { position: relative; width: 340px; height: 460px; background: #000; border: 1px solid #222; border-radius: 20px; }
            .label { position: absolute; font-size: 10px; font-weight: 700; color: #333; text-transform: uppercase; }
            .pc { position: absolute; width: 36px; height: 36px; background: #111; border: 1px solid #333; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; cursor: pointer; transition: background 0.2s, border-color 0.2s; color: #666; }
            .pc.selected { background: #8b1a1a; border-color: #ff4d4d; color: #fff; box-shadow: 0 0 12px rgba(139,26,26,0.6); }
            .pc.vip { border-color: #8b1a1a; color: #8b1a1a; }
            .pc.vip.selected { background: #ff4d4d; color: #000; }
            .pc.busy { background: #141414 !important; border-color: #222 !important; color: #2a2a2a !important; cursor: default; }
            .pc.free { box-shadow: 0 0 6px rgba(80,80,180,0.15); }

            .footer { background: #000; padding: 20px 16px 30px; border-top: 1px solid #1a1a1a; z-index: 20; }
            .date-selector { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 15px; margin-bottom: 15px; scrollbar-width: none; }
            .date-item { flex: 0 0 50px; height: 55px; background: rgba(255,255,255,0.03); border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; }
            .date-item.active { background: #8b1a1a; color: #fff; }
            .date-item span { font-size: 9px; color: #666; text-transform: uppercase; }
            .date-item.active span { color: #eee; }
            .date-item b { font-size: 15px; font-weight: 700; }
            .info-box { margin-bottom: 20px; }
            .info-label { font-size: 12px; color: #888; margin-bottom: 2px; }
            .info-value { font-size: 14px; font-weight: 700; line-height: 1.4; }
            .info-value span { color: #ff4d4d; }
            .btn-confirm { width: 100%; padding: 18px; background: #333; color: #666; border: none; border-radius: 14px; font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.3s; text-transform: uppercase; pointer-events: none; }
            .btn-confirm.active { background: #8b1a1a; color: #fff; pointer-events: auto; }

            /* Доп. стили для новых элементов */
            .static-obj { position: absolute; border: 1px solid rgba(255,255,255,0.1); color: #444; font-size: 9px; font-weight: 700; text-transform: uppercase; display: flex; align-items: center; justify-content: center; text-align: center; }
            .reception { width: 100px; height: 40px; border-style: dashed; flex-direction: column; gap: 2px; }
            .reception span { font-size: 16px; }
            .wc { width: 40px; height: 35px; background: #0a0a0a; }
            .entrance-label { position: absolute; color: #222; font-size: 12px; font-weight: 800; letter-spacing: 4px; }
            
            /* Обновленный стиль лейблов зон */
            .label { position: absolute; font-size: 11px; font-weight: 800; color: #222; text-transform: uppercase; letter-spacing: 1px; pointer-events: none; }

            /* СТИЛИ УВЕДОМЛЕНИЙ */
            .toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; }
            .toast { background: #1a1a1a; color: #fff; padding: 14px 18px; border-radius: 12px; margin-bottom: 10px; border-left: 4px solid #8b1a1a; box-shadow: 0 10px 25px rgba(0,0,0,0.5); display: flex; align-items: center; gap: 10px; font-size: 13px; font-weight: 700; min-width: 250px; animation: slideIn 0.3s ease-out forwards; }
            .toast.success { border-left-color: #4CAF50; }
            @keyframes slideIn { from { transform: translateX(120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
            @keyframes slideOut { to { transform: translateX(120%); opacity: 0; } }
        </style>
    </head>
    <body>

        <div class="slide-header">
            <a href="javascript:history.back()" class="back-btn"><span class="material-symbols-outlined">arrow_back</span></a>
            
            <div class="club-logo-frame">
                <img id="clubLogoImg" class="club-logo-img" src="" alt="">
                <div id="clubLogoPlaceholder" class="club-logo-placeholder">RG</div>
            </div>
            
            <span class="club-name" id="clubNameHeader">Загрузка...</span>
            <span class="club-address" id="clubAddrHeader"><span class="material-symbols-outlined" style="font-size:12px">location_on</span> —</span>
        </div>

    <div class="map-wrapper">
        <div class="map-container" id="clubMap">
            <div class="static-obj reception" style="top: 80px; left: 140px;">
                <span class="material-symbols-outlined">person</span>
                стойка<br>администратора
            </div>
            
            <div class="static-obj wc" style="top: 250px; right: 10px;">WC</div>
            <div class="static-obj wc" style="top: 190px; right: 10px;">WC</div>
            


            <div id="pcsLayer"></div>
        </div>
    </div>

        <div class="footer">
            <div class="date-selector" id="dateSelector"></div>
            <div class="info-box">
                <div class="info-label">Вы выбрали место:</div>
                <div class="info-value" id="seatLabel"><span>не выбраны</span></div>
                <div class="info-label" style="margin-top:10px">Время:</div>
                <div class="info-value" id="timeLabel">--:--</div>
            </div>
            <button class="btn-confirm" id="confirmBtn" onclick="handleBooking()">Подтвердить бронирование</button>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
        <script src="../js/seat.js"></script>
    </body>
    </html>
