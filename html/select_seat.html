    <!DOCTYPE html>
    <html lang="ru">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Выбор места — Бронирование</title>
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
        <style>
            * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
            body { background: #000; color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
            .header { padding: 20px; display: flex; align-items: center; gap: 15px; background: rgba(0,0,0,0.8); }
            .back-btn { background: #222; border: none; color: #fff; padding: 10px; border-radius: 10px; cursor: pointer; }
            
            .map-container { 
                flex: 1; 
                position: relative; 
                width: 100%; 
                max-width: 400px; 
                margin: 0 auto; 
                background: url('img/club-layout.png') no-repeat center; 
                background-size: contain; 
                border: 1px solid #333; 
            }

            .pc { 
                position: absolute; 
                width: 35px; 
                height: 35px; 
                background: rgba(255, 255, 255, 0.1); 
                border: 1px solid #fff; 
                border-radius: 8px; 
                display: flex; 
                align-items: center; 
                justify-content: center; 
                font-size: 12px; 
                font-weight: bold; 
                cursor: pointer; 
                transition: 0.3s; 
            }

            .pc.selected { background: #8b1a1a; border-color: #ff4d4d; box-shadow: 0 0 15px #8b1a1a; }
            
            /* Координаты на карте */
            #pc-1 { top: 150px; left: 60px; }
            #pc-2 { top: 150px; left: 110px; }
            #pc-30 { top: 320px; left: 200px; border-color: gold; color: gold; }

            .footer { background: #1c1c1c; padding: 25px; border-top-left-radius: 30px; border-top-right-radius: 30px; box-shadow: 0 -10px 30px rgba(0,0,0,0.5); }
            .info-text { margin-bottom: 15px; font-size: 14px; color: #aaa; line-height: 1.6; }
            .info-text b { color: #fff; }

            .btn-confirm { 
                width: 100%; 
                padding: 16px; 
                background: #8b1a1a; 
                color: #fff; 
                border: none; 
                border-radius: 15px; 
                font-size: 16px; 
                font-weight: 700; 
                cursor: pointer; 
                transition: 0.2s; 
            }
            .btn-confirm:active { transform: scale(0.97); }
        </style>
    </head>
    <body>

        <div class="header">
            <button class="back-btn" onclick="history.back()">←</button>
            <h3>Выбор места</h3>
        </div>

        <div class="map-container" id="clubMap">
            <div class="pc" id="pc-1" data-id="5" data-zone="7">1</div>
            <div class="pc" id="pc-2" data-id="6" data-zone="7">2</div>
            <div class="pc" id="pc-30" data-id="4" data-zone="9">30</div>
        </div>

        <div class="footer">
            <div class="info-text">
                Клуб: <b>ID 27</b><br>
                Время: <b id="timeLabel">--:--</b><br>
                Место: <b id="seatLabel">не выбрано</b>
            </div>
            <button class="btn-confirm" onclick="handleBooking()">Подтвердить бронирование</button>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
        <script>
            const API_URL = 'https://subopposite-nonheretical-brynn.ngrok-free.dev';
let selectedPC = null;

// 1. Подтягиваем данные из localStorage
const startTime = localStorage.getItem('booking_start_time');
const endTime = localStorage.getItem('booking_end_time');
const clubId = localStorage.getItem('selected_club_id');

// Отображаем время на странице
if (startTime && endTime) {
    document.getElementById('timeLabel').innerText = `${startTime} - ${endTime}`;
}

// 2. Выбор компа на карте
document.querySelectorAll('.pc').forEach(el => {
    el.addEventListener('click', function() {
        document.querySelectorAll('.pc').forEach(p => p.classList.remove('selected'));
        this.classList.add('selected');

        selectedPC = {
            dbId: this.dataset.id,
            zoneId: this.dataset.zone,
            number: this.innerText
        };
        document.getElementById('seatLabel').innerText = `Компьютер №${selectedPC.number}`;
    });
});

// 3. Отправка брони
// Функция для декодирования JWT (чтобы вытащить sub/user_id)
function getUserIdFromToken(token) {
    try {
        const base64Url = token.split('.')[1];
        const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
        const payload = JSON.parse(window.atob(base64));
        // Обычно ID лежит в 'sub', но проверь консоль, если не сработает
        return payload.sub || payload.user_id; 
    } catch (e) {
        return null;
    }
}

async function handleBooking() {
    if (!selectedPC) {
        alert("Выбери место на карте!");
        return;
    }

    const token = localStorage.getItem('access_token');
    const userId = getUserIdFromToken(token);

    if (!userId) {
        alert("Ошибка авторизации. Перезайди в аккаунт.");
        return;
    }

    const clubId = localStorage.getItem('selected_club_id');
    const startTime = localStorage.getItem('booking_start_time');
    const endTime = localStorage.getItem('booking_end_time');

    // Формируем дату YYYY-MM-DD
    const dateStr = new Date().toISOString().split('T')[0];

    // Формируем объект СТРОГО как в твоем Swagger (массив объектов)
    const bookingData = [{
        "start_time": `${dateStr}T${startTime}:00`, // Убираем .000Z если бэк не на UTC
        "end_time": `${dateStr}T${endTime}:00`,
        "total_price": 0,
        "user_id": Number(userId),
        "computer_id": Number(selectedPC.dbId),
        "zone_id": Number(selectedPC.zoneId),
        "club_id": Number(clubId)
    }];

    console.log("Улетает на сервер:", bookingData);

    try {
        const response = await axios.post(`${API_URL}/bookings/create_booking`, bookingData, {
            headers: { 
                'Authorization': `Bearer ${token}`,
                'ngrok-skip-browser-warning': '69420',
                'Content-Type': 'application/json'
            }
        });

        if (response.status === 200 || response.status === 201) {
            alert("Бронь прошла!");
            window.location.href = 'booking.html';
        }
    } catch (error) {
        console.error("Ошибка 422 детали:", error.response?.data);
        // Если опять 422, выведет в чем именно косяк (время или ID)
        alert("Ошибка: " + JSON.stringify(error.response?.data?.detail));
    }
}
        </script>
    </body>
    </html>
