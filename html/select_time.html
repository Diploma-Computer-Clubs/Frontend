<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Выбор времени</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background: #000; color: #fff; font-family: 'Montserrat', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .container { width: 90%; max-width: 400px; text-align: center; background: #1c1c1c; padding: 40px 20px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { font-size: 24px; margin-bottom: 30px; }
        .time-group { margin-bottom: 25px; text-align: left; padding: 0 20px; }
        label { display: block; color: #888; font-size: 14px; margin-bottom: 8px; }
        input[type="time"] { width: 100%; background: #262626; border: 1px solid #444; border-radius: 12px; padding: 15px; color: #fff; font-size: 18px; outline: none; }
        input[type="time"]:focus { border-color: #8b1a1a; }
        .btn-next { width: 100%; background: #8b1a1a; color: #fff; border: none; padding: 18px; border-radius: 15px; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 20px; transition: 0.2s; }
        .btn-next:active { transform: scale(0.98); }
        .btn-back { background: none; border: none; color: #666; margin-top: 15px; cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>

<div class="container">
    <h1>Когда придете?</h1>
    
    <div class="time-group">
        <label>Начало бронирования</label>
        <input type="time" id="startTime" value="14:00">
    </div>

    <div class="time-group">
        <label>Конец бронирования</label>
        <input type="time" id="endTime" value="18:00">
    </div>

    <button class="btn-next" onclick="saveTimeAndProceed()">Выбрать место</button>
    <button class="btn-back" onclick="history.back()">Назад к клубу</button>
</div>

<script>
    // ── AUTH GUARD ──
    (function() { if (!localStorage.getItem('access_token')) window.location.replace('check.html'); })();

    // Пробрасываем club_id из URL
    const _params = new URLSearchParams(window.location.search);
    const _clubId = _params.get('club_id') || '';

    function saveTimeAndProceed() {
        const start = document.getElementById('startTime').value;
        const end   = document.getElementById('endTime').value;

        if (!start || !end) {
            alert("Пожалуйста, выберите время");
            return;
        }

        // Вычисляем дату начала: если выбранное время < now+30мин — это завтра
        const now = new Date();
        const [sh, sm] = start.split(':').map(Number);
        const [eh, em] = end.split(':').map(Number);

        // Пробуем сегодня
        const startDt = new Date(now);
        startDt.setHours(sh, sm, 0, 0);

        // Если время уже прошло или меньше 30 мин — сдвигаем на завтра
        if ((startDt - now) < 30 * 60 * 1000) {
            startDt.setDate(startDt.getDate() + 1);
        }

        // Дата конца: если end <= start (переход через полночь) — следующий день от start
        const endDt = new Date(startDt);
        endDt.setHours(eh, em, 0, 0);
        if (endDt <= startDt) {
            endDt.setDate(endDt.getDate() + 1);
        }

        // Форматируем дату как YYYY-MM-DD
        const fmt = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;

        localStorage.setItem('booking_start_time', start);
        localStorage.setItem('booking_end_time', end);
        localStorage.setItem('booking_start_date', fmt(startDt)); // дата начала
        localStorage.setItem('booking_end_date',   fmt(endDt));   // дата конца

        window.location.href = 'select_seat.html' + (_clubId ? '?club_id=' + _clubId : '');
    }
</script>
</body>
</html>
