<!DOCTYPE html>
<html lang="ru">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Забыли пароль</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: Arial, Helvetica, sans-serif;
}

html,body{
height:100%;
overflow:hidden;
color:white;
}

body{
display:flex;
justify-content:center;
align-items:center;
background:#000;
position:relative;
}

body::before{
content:"";
position:absolute;
top:-40px;
left:-40px;
right:-40px;
bottom:-40px;
background:url("/frontend/Frontend/img/bg.png") center/cover no-repeat;
filter: blur(8px) brightness(0.2);
z-index:-1;
}

.container{
width:340px;
display:flex;
flex-direction:column;
}

.logo{
display:flex;
justify-content:center;
margin-bottom:50px;
}

.logo img{
width:170px;
}

.field{
display:flex;
flex-direction:column;
margin-bottom:25px;
font-size:15px;
}

.field input{
margin-top:8px;
padding:14px;
border-radius:10px;
border:1px solid #aaa;
background:transparent;
color:white;
font-size:16px;
outline:none;
}

.field input::placeholder{
color:#ccc;
}

.title{
text-align:center;
margin-bottom:25px;
font-size:15px;
color:#ddd;
}

button{
width:100%;
padding:16px;
border-radius:14px;
border:none;
font-size:16px;
cursor:pointer;
}

.login{
background:#e9e9e9;
color:#000;
box-shadow:
0 4px 8px rgba(0,0,0,0.25),
inset 0 1px 0 rgba(255,255,255,0.6);
}

button:active{
transform:scale(0.97);
}

button:disabled{
opacity:0.6;
cursor:not-allowed;
}

#errorMessage{
color:#ff6b6b;
margin-bottom:15px;
font-size:14px;
min-height:18px;
}

</style>

</head>

<body>

<div class="container">

  <div class="logo">
    <img src="../img/Frame 6.svg" alt="logo">
  </div>

  <p class="title">Введите номер телефона</p>

  <form id="forgotForm">

    <div class="field">
      <label>Номер телефона</label>
      <input name="phone" type="tel" placeholder="+7" autocomplete="tel">
    </div>

    <div id="errorMessage"></div>

    <button class="login" type="submit" id="submitBtn">
      Продолжить
    </button>

  </form>

</div>

<script>

const form = document.getElementById("forgotForm");
const errorDiv = document.getElementById("errorMessage");
const submitBtn = document.getElementById("submitBtn");

form.addEventListener("submit", async (e) => {

  e.preventDefault();

  errorDiv.textContent = "";

  const phone = form.phone.value.trim();

  if (!phone) {
    errorDiv.textContent = "Введите номер телефона";
    return;
  }

  submitBtn.disabled = true;
  submitBtn.textContent = "Загрузка...";

  try {

    /* Шаг 1: проверяем существование пользователя */
    const findRes = await fetch(
      `https://subopposite-nonheretical-brynn.ngrok-free.dev/users/find_user?phone_number=${encodeURIComponent(phone)}`,
      {
        method: "GET",
        headers: { "ngrok-skip-browser-warning": "69420" }
      }
    );

    const findData = await findRes.json();

    if (!findRes.ok) {
      const message = findData.detail === "User not found"
        ? "Пользователь не найден"
        : findData.detail || "Ошибка";
      errorDiv.textContent = message;
      return;
    }

    /* Шаг 2: отправляем SMS */
    const smsRes = await fetch(
      "https://subopposite-nonheretical-brynn.ngrok-free.dev/users/send-sms",
      {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "ngrok-skip-browser-warning": "69420"
        },
        body: JSON.stringify({ phone_number: phone })
      }
    );

    if (!smsRes.ok) {
      const smsData = await smsRes.json().catch(() => ({}));
      errorDiv.textContent = smsData.detail || "Ошибка отправки SMS";
      return;
    }

    /* Сохраняем номер для следующих страниц */
    sessionStorage.setItem("resetPhone", phone);

    /* Редирект на ввод кода */
    window.location.href = "forgot-code.html";

  } catch (err) {

    console.error(err);
    errorDiv.textContent = "Сервер недоступен";

  } finally {

    submitBtn.disabled = false;
    submitBtn.textContent = "Продолжить";

  }

});

</script>

</body>
</html>
