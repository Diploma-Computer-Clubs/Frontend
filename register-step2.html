<!DOCTYPE html>
<html lang="ru">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Регистрация</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: Arial, Helvetica, sans-serif;
}

html,body{
height:100%;
overflow:hidden;
color:white;
}

body{
display:flex;
justify-content:center;
align-items:center;
background:#000;
position:relative;
}

body::before{
content:"";
position:absolute;

top:-40px;
left:-40px;
right:-40px;
bottom:-40px;

background:url("/img/bg.png") center/cover no-repeat;

filter: blur(8px) brightness(0.2);

z-index:-1;
}

.container{
width:340px;
display:flex;
flex-direction:column;
}

.logo{
display:flex;
justify-content:center;
margin-bottom:50px;
}

.logo img{
width:170px;
}

.field{
display:flex;
flex-direction:column;
margin-bottom:20px;
font-size:15px;
}

.field input,
.field select{
margin-top:8px;
padding:14px;
border-radius:10px;
border:1px solid #aaa;
background:transparent;
color:white;
font-size:16px;
outline:none;
}

.field select option{
color:black;
}

button{
width:100%;
padding:16px;
border-radius:14px;
border:none;
font-size:16px;
cursor:pointer;
background:#e9e9e9;
color:black;

box-shadow:
0 4px 8px rgba(0,0,0,0.25),
inset 0 1px 0 rgba(255,255,255,0.6);
}

button:active{
transform:scale(0.97);
}

</style>

</head>

<body>

<div class="container">

<div class="logo">
<img src="img/bg.png" alt="logo">
</div>

<form>

<div class="field">
<label>Имя</label>
<input type="text" placeholder="Джеймс">
</div>

<div class="field">
<label>Город</label>
<select>
<option>Выберите город</option>
<option>Алматы</option>
<option>Астана</option>
<option>Шымкент</option>
</select>
</div>

<div class="field">
<label>Пол</label>
<select>
<option>Выберите пол</option>
<option>Мужской</option>
<option>Женский</option>
</select>
</div>

<button type="submit">Зарегистрироваться</button>

</form>

</div>

</body>
</html>
