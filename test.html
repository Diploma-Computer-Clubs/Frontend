<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Find User</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }
    .user-card {
      border: 1px solid #ccc;
      padding: 15px;
      border-radius: 10px;
      max-width: 400px;
    }
    .user-card p {
      margin: 5px 0;
    }
  </style>
</head>
<body>

<h2>Поиск пользователя</h2>

<input type="text" id="phone" placeholder="+77078187016">
<button onclick="findUser()">Найти</button>

<div id="result" style="margin-top:20px;"></div>

<script>
async function findUser() {
  const phone = document.getElementById('phone').value;
  const resultDiv = document.getElementById('result');

  resultDiv.innerHTML = "Загрузка...";

  try {
    const response = await fetch(
      `https://subopposite-nonheretical-brynn.ngrok-free.dev/users/find_user?phone_number=${encodeURIComponent(phone)}`,
      {
        headers: {
          "ngrok-skip-browser-warning": "69420"
        }
      }
    );

    const data = await response.json();

    if (data.user) {
      const user = data.user;

      resultDiv.innerHTML = `
        <div class="user-card">
          <p><strong>ID:</strong> ${user.id}</p>
          <p><strong>Имя:</strong> ${user.full_name}</p>
          <p><strong>Телефон:</strong> ${user.phone_number}</p>
          <p><strong>Репутация:</strong> ${user.reputation}</p>
          <p><strong>Роль:</strong> ${user.role}</p>
        </div>
      `;
    } else {
      resultDiv.innerHTML = "Пользователь не найден";
    }

  } catch (error) {
    resultDiv.innerHTML = "Ошибка запроса";
    console.error(error);
  }
}
</script>

</body>
</html>
