<!DOCTYPE html>
<html lang="ru">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Регистрация</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: Arial, Helvetica, sans-serif;
}

html,body{
height:100%;
overflow:hidden;
color:white;
}

body{
display:flex;
justify-content:center;
align-items:center;
background:#000;
position:relative;
}

body::before{
content:"";
position:absolute;
top:-40px;
left:-40px;
right:-40px;
bottom:-40px;

background:url("/img/bg.png") center/cover no-repeat;
filter: blur(8px) brightness(0.2);
z-index:-1;
}

.container{
width:340px;
display:flex;
flex-direction:column;
}

.logo{
display:flex;
justify-content:center;
margin-bottom:50px;
}

.logo img{
width:170px;
}

.field{
display:flex;
flex-direction:column;
margin-bottom:20px;
font-size:15px;
}

.field input{
margin-top:8px;
padding:14px;
border-radius:10px;
border:1px solid #aaa;
background:transparent;
color:white;
font-size:16px;
outline:none;
}

.field input::placeholder{
color:#ccc;
}

.error{
color:#ff6b6b;
font-size:14px;
margin-bottom:15px;
min-height:18px;
}

button{
width:100%;
padding:16px;
border-radius:14px;
border:none;
font-size:16px;
cursor:pointer;
background:#e9e9e9;
color:black;

box-shadow:
0 4px 8px rgba(0,0,0,0.25),
inset 0 1px 0 rgba(255,255,255,0.6);
}

button:active{
transform:scale(0.97);
}

</style>

</head>

<body>

<div class="container">

<div class="logo">
<img src="/img/Frame 6.svg">
</div>

<form id="registerForm">

<div class="field">
<label>Номер телефона</label>
<input id="phone" type="tel" placeholder="+7">
</div>

<div class="field">
<label>Имя</label>
<input id="name" type="text" placeholder="Ваше имя">
</div>

<div class="field">
<label>Город</label>
<input id="city" type="text" placeholder="Ваш город">
</div>

<div class="field">
<label>Пароль</label>
<input id="password" type="password">
</div>

<div class="field">
<label>Повторите пароль</label>
<input id="password2" type="password">
</div>

<div class="error" id="errorText"></div>

<button type="submit">Зарегистрироваться</button>

</form>

</div>

<script>

const form = document.getElementById("registerForm");

form.addEventListener("submit", async function(e){

e.preventDefault();

const phone = document.getElementById("phone").value.trim();
const name = document.getElementById("name").value.trim();
const city = document.getElementById("city").value.trim();
const password = document.getElementById("password").value;
const password2 = document.getElementById("password2").value;

const error = document.getElementById("errorText");

/* проверки */

const phoneRegex = /^\+7\d{10}$/;

if(!phoneRegex.test(phone)){
error.textContent = "Введите номер в формате +7XXXXXXXXXX";
return;
}

if(name.length < 2){
error.textContent = "Введите имя";
return;
}

if(city.length < 2){
error.textContent = "Введите город";
return;
}

if(password.length < 6){
error.textContent = "Пароль должен быть минимум 6 символов";
return;
}

if(password !== password2){
error.textContent = "Пароли не совпадают";
return;
}

/* маппинг городов */

const cityMap = {
"Астана": 4,
"Караганда": 9,
"Киев": 1,
"Мамба": 14
};

const city_id = cityMap[city];

if(!city_id){
error.textContent = "Выберите корректный город";
return;
}

/* очистка ошибки */
error.textContent = "";

/* отправка */

try{

const response = await fetch("https://subopposite-nonheretical-brynn.ngrok-free.dev/users/registration",{

method:"POST",

headers:{
"Content-Type":"application/json",
"ngrok-skip-browser-warning": "69420"
},

body: JSON.stringify({
password: password,
phone_number: phone,
full_name: name,
role: "user",
city_id: city_id
})

});

const data = await response.json();

console.log("Ответ сервера:", data);

if(response.ok){
console.log("✅ Регистрация успешна");
alert("Успешная регистрация");
}else{
console.log("❌ Ошибка регистрации");
error.textContent = data.message || "Ошибка регистрации";
}

}catch(err){

console.log("🚫 Ошибка запроса:", err);
error.textContent = "Сервер недоступен";

}

});

</script>

</body>
</html>
