<!DOCTYPE html>
<html lang="ru">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Вход</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: Arial, Helvetica, sans-serif;
}

html,body{
height:100%;
overflow:hidden;
color:white;
}

body{
display:flex;
justify-content:center;
align-items:center;
background:#000;
position:relative;
}

/* фон */

body::before{
content:"";
position:absolute;

top:-40px;
left:-40px;
right:-40px;
bottom:-40px;

background:url("/img/bg.png") center/cover no-repeat;

filter: blur(8px) brightness(0.2);

z-index:-1;
}

/* контейнер */

.container{
width:340px;
display:flex;
flex-direction:column;
}

/* логотип */

.logo{
display:flex;
justify-content:center;
margin-bottom:50px;
}

.logo img{
width:170px;
}

/* форма */

.field{
display:flex;
flex-direction:column;
margin-bottom:20px;
font-size:15px;
}

.field input{
margin-top:8px;
padding:14px;
border-radius:10px;
border:1px solid #aaa;
background:transparent;
color:white;
font-size:16px;
outline:none;
}

.field input::placeholder{
color:#ccc;
}

/* забыли пароль */

.forgot{
font-size:13px;
text-align:right;
margin-bottom:30px;
color:#cfcfcf;
text-decoration:none;
display:block;
}

.forgot:hover{
text-decoration:underline;
}

/* кнопки */

button{
width:100%;
padding:16px;
border-radius:14px;
border:none;
font-size:16px;
cursor:pointer;
}

/* кнопка войти */

.login{
background:#e9e9e9;
color:#000;
margin-bottom:25px;

box-shadow:
0 4px 8px rgba(0,0,0,0.25),
inset 0 1px 0 rgba(255,255,255,0.6);
}

/* создать аккаунт */

.register{
background:none;
color:white;
font-size:17px;
}

button:active{
transform:scale(0.97);
}

</style>

</head>

<body>

<div class="container">

<div class="logo">
<img src="/img/Frame 6.svg" alt="logo">
</div>

<form id="loginForm">

<div class="field">
<label>Номер телефона</label>
<input name="phone" type="tel" placeholder="+7">
</div>

<div class="field">
<label>Пароль</label>
<input name="password" type="password">
</div>

<a href="forgot-1.html" class="forgot">Забыли пароль?</a>



<div id="errorMessage" style="color:#ff6b6b; margin-bottom:15px; font-size:14px;"></div>
<!-- Tut -->


<button class="login" type="submit">Войти</button>

<button class="register" id="createAccount" type="button">
Создайте аккаунт
</button>

</form>

</div>

<script>

const form = document.getElementById("loginForm");
const createAccount = document.getElementById("createAccount");

/* логин */

const errorDiv = document.getElementById("errorMessage");

form.addEventListener("submit", async (e) => {

e.preventDefault();

errorDiv.textContent = ""; // очистка старой ошибки

const phone = form.phone.value;
const password = form.password.value;

try {

const res = await fetch("https://subopposite-nonheretical-brynn.ngrok-free.dev/auth/login", {
method: "POST",
headers:{
"Content-Type":"application/json",
"ngrok-skip-browser-warning": "69420"
},
body: JSON.stringify({
phone_number: phone,
password: password
})
});

/* читаем ответ ВСЕГДА */
const data = await res.json();

/* если ошибка */
if (!res.ok) {

const message = data.detail || "Ошибка входа";
console.log("❌", message);

errorDiv.textContent = message;

return;
}

/* если успех */
console.log("✅ Успешный вход:", data);

errorDiv.style.color = "#4cff88";
errorDiv.textContent = "Успешный вход!";

} catch (err) {

console.log("❌ Сервер не отвечает", err);
errorDiv.textContent = "Сервер недоступен";

}

});
/* переход на регистрацию */

createAccount.addEventListener("click", () => {

window.location.href = "register-step1.html";

});

</script>

</body>
</html>
